<!DOCTYPE html>
<html lang="en">

    <title>Computational Linguistics | Study Guide</title>
    
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 400ms, transform 400ms; }

</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { createRoot } from 'react-dom/client';
        import React, { useState, useEffect } from 'react';
        import { 
            BookOpen, Users, BrainCircuit, Feather, ShieldAlert, Sparkles,
            Quote, Zap, Briefcase, ScrollText, HeartHandshake, Home, HelpCircle, 
            CheckCircle, XCircle, Network
        } from 'lucide-react';

        // Soft, highly readable Arabic Dropdown Component
        const Ar = ({ title, children }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div dir="rtl" className="mt-4 border border-slate-200 rounded-xl overflow-hidden text-right transition-all shadow-sm">
                    <button 
                        onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIsOpen(!isOpen); }}
                        className="w-full flex items-center justify-between p-3.5 bg-emerald-50/50 hover:bg-emerald-50 transition-colors"
                    >
                        <div className="flex items-center gap-3">
                            <span className="inline-block bg-emerald-100 text-emerald-800 text-[10px] font-black px-2.5 py-1 rounded border border-emerald-200 uppercase tracking-wide">شرح تفصيلي مبسط</span>
                            {title && <span className="text-[13px] font-bold text-emerald-950 font-arabic">{title}</span>}
                        </div>
                        <svg className={`w-4 h-4 text-emerald-600 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isOpen ? 'max-h-[2500px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="p-5 bg-white border-t border-emerald-100 text-slate-700 text-[14px] leading-[1.8] font-normal font-arabic">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const Section = ({ title, subtitle, icon: Icon, children, color = "rose" }) => {
            const styles = {
                emerald: { header: "from-emerald-700 to-teal-900", text: "text-emerald-50", icon: "text-emerald-200" },
                rose: { header: "from-rose-700 to-red-900", text: "text-rose-50", icon: "text-rose-200" },
                amber: { header: "from-amber-600 to-orange-800", text: "text-amber-50", icon: "text-amber-200" },
                indigo: { header: "from-indigo-700 to-violet-900", text: "text-indigo-50", icon: "text-indigo-200" },
                purple: { header: "from-purple-700 to-indigo-900", text: "text-purple-50", icon: "text-purple-200" },
                blue: { header: "from-blue-700 to-slate-900", text: "text-blue-50", icon: "text-blue-200" }
            };
            const s = styles[color] || styles.rose;

            return (
                <div className="bg-white rounded-[2rem] shadow-md shadow-slate-200/50 overflow-visible mb-10 border border-slate-200 relative group">
                    <div className={`p-8 bg-gradient-to-br ${s.header} rounded-t-[2rem] relative overflow-hidden`}>
                        <div className={`absolute -right-10 -top-10 ${s.icon} opacity-10 rotate-12 transition-transform duration-700 group-hover:rotate-6 group-hover:scale-110`}>
                            <Icon size={180} />
                        </div>
                        <div className="relative z-10 flex items-start gap-5">
                            <div className="p-3.5 bg-white/20 backdrop-blur-md rounded-2xl text-white shadow-inner shrink-0">
                                <Icon size={32} />
                            </div>
                            <div>
                                <h2 className="text-2xl font-black tracking-tight text-white mb-1">{title}</h2>
                                {subtitle && <p className={`font-medium ${s.text} opacity-90 text-sm`}>{subtitle}</p>}
                            </div>
                        </div>
                    </div>
                    <div className="p-6 md:p-8 space-y-6 text-slate-700 leading-relaxed text-[16px]">
                        {children}
                    </div>
                </div>
            );
        };

        const TermCard = ({ index, name, definition, explanation, example, arabicTitle, arabicContent, themeColor = "rose" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const borderColors = {
                emerald: isOpen ? 'border-emerald-400 ring-1 ring-emerald-400' : 'hover:border-emerald-300',
                indigo: isOpen ? 'border-indigo-400 ring-1 ring-indigo-400' : 'hover:border-indigo-300',
                rose: isOpen ? 'border-rose-400 ring-1 ring-rose-400' : 'hover:border-rose-300',
                amber: isOpen ? 'border-amber-400 ring-1 ring-amber-400' : 'hover:border-amber-300',
                purple: isOpen ? 'border-purple-400 ring-1 ring-purple-400' : 'hover:border-purple-300',
                blue: isOpen ? 'border-blue-400 ring-1 ring-blue-400' : 'hover:border-blue-300'
            };
            const indexColors = {
                emerald: 'bg-emerald-100 text-emerald-800 border-emerald-200',
                indigo: 'bg-indigo-100 text-indigo-800 border-indigo-200',
                rose: 'bg-rose-100 text-rose-800 border-rose-200',
                amber: 'bg-amber-100 text-amber-800 border-amber-200',
                purple: 'bg-purple-100 text-purple-800 border-purple-200',
                blue: 'bg-blue-100 text-blue-800 border-blue-200'
            };

            return (
                <div className={`bg-white border rounded-3xl transition-all duration-300 ${isOpen ? 'shadow-md' : 'shadow-sm'} ${borderColors[themeColor] || borderColors.rose}`}>
                    <div 
                        className="p-5 flex items-center justify-between cursor-pointer bg-slate-50/50 hover:bg-slate-50 transition-colors rounded-t-3xl"
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <div className="flex items-center gap-4">
                            <div className={`w-8 h-8 rounded-xl flex items-center justify-center font-bold text-xs border ${indexColors[themeColor] || indexColors.rose}`}>
                                {index}
                            </div>
                            <div>
                                <h3 className="font-extrabold text-slate-900 text-md">{name}</h3>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Key Terminology</p>
                            </div>
                        </div>
                        <div className="w-8 h-8 rounded-full flex items-center justify-center bg-white border border-slate-200 shadow-sm shrink-0">
                            <svg className={`w-4 h-4 text-slate-500 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </div>
                    <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isOpen ? 'max-h-[1500px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="p-6 border-t border-slate-100 space-y-4 bg-white rounded-b-3xl text-sm leading-relaxed">
                            <div>
                                <span className="inline-block bg-slate-100 text-slate-700 text-[10px] font-bold px-2 py-0.5 rounded mb-1">Official Definition</span>
                                <p className="text-slate-800 font-medium italic">"{definition}"</p>
                            </div>
                            {explanation && (
                                <div>
                                    <span className="inline-block bg-slate-100 text-slate-700 text-[10px] font-bold px-2 py-0.5 rounded mb-1">Detailed Explanation</span>
                                    <p className="text-slate-600">{explanation}</p>
                                </div>
                            )}
                            {example && (
                                <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                    <span className="inline-block bg-white text-slate-700 text-[9px] font-bold px-2 py-0.5 rounded border border-slate-200 mb-1">Concrete Example</span>
                                    <div className="text-slate-800 font-mono text-xs">{example}</div>
                                </div>
                            )}
                            {arabicContent && (
                                <Ar title={arabicTitle || `شرح مصطلح: ${name}`}>
                                    {arabicContent}
                                </Ar>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const EssayCard = ({ question, answer, arabicKey, themeColor = "rose" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const activeColors = {
                rose: "bg-rose-50 border-rose-200 text-rose-800 focus:ring-rose-500",
                indigo: "bg-indigo-50 border-indigo-200 text-indigo-800 focus:ring-indigo-500",
                purple: "bg-purple-50 border-purple-200 text-purple-800 focus:ring-purple-500",
                blue: "bg-blue-50 border-blue-200 text-blue-800 focus:ring-blue-500",
                emerald: "bg-emerald-50 border-emerald-200 text-emerald-800 focus:ring-emerald-500",
                amber: "bg-amber-50 border-amber-200 text-amber-800 focus:ring-amber-500"
            };

            return (
                <div className={`bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm transition-all duration-300 ${isOpen ? 'ring-1 ring-slate-300 shadow-md' : 'hover:border-slate-300'}`}>
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full p-5 text-left flex items-start justify-between gap-4 font-bold text-[15px] text-slate-850 hover:bg-slate-50 transition-colors"
                    >
                        <span className="leading-snug text-slate-800">{question}</span>
                        <div className="w-8 h-8 rounded-full flex items-center justify-center border border-slate-200 bg-white shrink-0 mt-0.5">
                            <svg className={`w-4 h-4 text-slate-500 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </button>
                    {isOpen && (
                        <div className="p-6 border-t border-slate-150 bg-white space-y-4">
                            <div className="text-sm leading-relaxed text-slate-700 space-y-3">
                                {answer}
                            </div>
                            {arabicKey && (
                                <Ar title="تبسيط وتلخيص مقالي">
                                    {arabicKey}
                                </Ar>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const themeColors = {
                intro: {
                    accent: "text-rose-700",
                    bgAccent: "bg-rose-800",
                    navActive: "text-rose-700 border-b-2 border-rose-700",
                    tabSelection: "rose"
                },
                apps: {
                    accent: "text-amber-700",
                    bgAccent: "bg-amber-800",
                    navActive: "text-amber-700 border-b-2 border-amber-700",
                    tabSelection: "amber"
                },
                nlp: {
                    accent: "text-emerald-700",
                    bgAccent: "bg-emerald-800",
                    navActive: "text-emerald-700 border-b-2 border-emerald-700",
                    tabSelection: "emerald"
                },
                tech: {
                    accent: "text-blue-700",
                    bgAccent: "bg-blue-800",
                    navActive: "text-blue-700 border-b-2 border-blue-700",
                    tabSelection: "blue"
                },
                lexicon: {
                    accent: "text-purple-700",
                    bgAccent: "bg-purple-800",
                    navActive: "text-purple-700 border-b-2 border-purple-700",
                    tabSelection: "purple"
                },
                quiz: {
                    accent: "text-indigo-700",
                    bgAccent: "bg-indigo-800",
                    navActive: "text-indigo-700 border-b-2 border-indigo-700",
                    tabSelection: "indigo"
                }
            };

            const [activeTab, setActiveTab] = useState('intro');
            const [isAnimating, setIsAnimating] = useState(false);
            
            // Interactive MCQ state
            const [answers, setAnswers] = useState({});
            const [score, setScore] = useState(null);
            const [showResults, setShowResults] = useState(false);

            const handleTabSwitch = (tab) => {
                if(tab === activeTab) return;
                setIsAnimating(true);
                setTimeout(() => {
                    setActiveTab(tab);
                    setIsAnimating(false);
                }, 150);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const tabConfig = [
                { id: 'intro', label: '1. Introduction & Structure', icon: ScrollText, color: 'rose' },
                { id: 'apps', label: '2. Core Applications', icon: Briefcase, color: 'amber' },
                { id: 'nlp', label: '3. NLP & Ambiguities', icon: ShieldAlert, color: 'emerald' },
                { id: 'tech', label: '4. Tech & Deep Learning', icon: Network, color: 'blue' },
                { id: 'lexicon', label: '5. Key Terms Lexicon', icon: BookOpen, color: 'purple' },
                { id: 'quiz', label: '6. Practice Exam Hub', icon: BrainCircuit, color: 'indigo' },
            ];

            const activeColors = themeColors[activeTab] || themeColors.intro;

            // Interactive MCQ Questions & Correct Options
            const mcqQuestions = [
                { id: 1, text: "Computational linguistics sits at the interdisciplinary intersection of which fields?", options: { a: "Linguistics, History, and Anthropology", b: "Linguistics, Computer Science, AI, and Cognitive Science", c: "Mathematics, Physics, and Mechanical Engineering", d: "Sociology, Psychology, and Media Studies" }, correct: "b", explanation: "As defined in the syllabus, computational linguistics is an interdisciplinary field combining linguistics, computer science, artificial intelligence, and cognitive science." },
                { id: 2, text: "General linguistics is considered the 'nucleus' of the science. Its four major components are:", options: { a: "Dialectology, Sociolinguistics, Lexicography, and Typology", b: "Phonology, Morphology, Syntax, and Semantics/Pragmatics", c: "History, Comparison, Translation, and Writing", d: "Stemming, Parsing, Tokenization, and Embedding" }, correct: "b", explanation: "The structure of general linguistics is directly mapped to Phonology (speech sounds), Morphology (word pieces), Syntax (sentence structures), and Semantics/Pragmatics (meaning and intent)." },
                { id: 3, text: "Which branch of linguistics classifies a variety of languages according to the similarity of their features, regardless of origin?", options: { a: "Comparative Linguistics", b: "Contrastive Linguistics (Linguistic Typology)", c: "Dialectology", d: "Sociolinguistics" }, correct: "b", explanation: "Contrastive linguistics, or linguistic typology, specifically groups and classifies languages based on feature similarities rather than genetic ancestral links." },
                { id: 4, text: "If 'returned' and 'returning' belong to the same base set, that abstract base set is called a:", options: { a: "Token", b: "Wordform", c: "Lexeme", d: "Morpheme" }, correct: "c", explanation: "A lexeme is the abstract group of wordforms sharing the same base meaning (e.g. {return, returns, returned} belongs to the lexeme RETURN)." },
                { id: 5, text: "What is the smallest unit of meaning in language?", options: { a: "Token", b: "Morpheme", c: "Lexeme", d: "Phoneme" }, correct: "b", explanation: "A morpheme is the smallest unit of meaning. For example, 'longer' has two morphemes: 'long' (base meaning) and '-er' (comparative marker)." },
                { id: 6, text: "Which of the following describes the purpose of Retrieval-Augmented Generation (RAG)?", options: { a: "It translates audio files to textual representations in real time.", b: "It combines information retrieval with language generation by letting models search facts before responding.", c: "It replaces neural embeddings with a simple rule-based lookup database.", d: "It compresses the size of large corpora using lossy algorithms." }, correct: "b", explanation: "Retrieval-Augmented Generation (RAG) is a highly modern technique that retrieves relevant facts from a database first, then passes them to the LLM to generate an accurate, hallucination-free response." },
                { id: 7, text: "Why is natural language processing (NLP) uniquely difficult for computers?", options: { a: "Computers do not support UTF-8 or Unicode characters.", b: "Language is complex, ambiguous, context-dependent, and symbols are represented as continuous signals in the brain.", c: "The rules of English grammar have not changed since classical antiquity.", d: "Programming languages like Python cannot handle string variables." }, correct: "b", explanation: "NLP is challenging because human language is infinitely generative, highly ambiguous, context-dependent, and represented in our neural pathways as continuous patterns despite being categorical." },
                { id: 8, text: "A sentence that is syntactically valid but semantically invalid is:", options: { a: "'The dog went away.'", b: "'cows flow supremely'", c: "'The thief apartment the robbed.'", d: "'investigación' to 'investigation'" }, correct: "b", explanation: "'cows flow supremely' has a valid Subject-Verb-Adverb structure (syntactically correct) but makes zero logical sense (semantically incorrect)." },
                { id: 9, text: "Constituency parsing breaks sentences down using what mechanism?", options: { a: "Directed dependency links between individual words", b: "Context-Free Grammars (CFGs) to create hierarchical groupings (like Noun Phrases and Verb Phrases)", c: "Reducing all words to their roots via the Porter algorithm", d: "Replacing lexical items with vector lists of floating-point numbers" }, correct: "b", explanation: "Constituency parsing uses Context-Free Grammars (CFGs) to group words into structural phrases (constituents) like NP and VP, resulting in a hierarchical parse tree." },
                { id: 10, text: "In the sentence 'John gave Mary a book', what is the semantic role (SRL) of 'Mary'?", options: { a: "Agent", b: "Theme", c: "Recipient", d: "Modifier" }, correct: "c", explanation: "In Semantic Role Labeling, 'John' is the Agent (actor), 'book' is the Theme (object), and 'Mary' is the Recipient (the receiver of the action)." },
                { id: 11, text: "Which transformer model was designed primarily with language understanding (reads text in both directions) as its main goal?", options: { a: "GPT", b: "BERT", c: "T5", d: "LSTM" }, correct: "b", explanation: "BERT (Bidirectional Encoder Representations from Transformers) is bidirectional and designed specifically for deep contextual language understanding." },
                { id: 12, text: "Which transformer model treats every task (translation, summarization, etc.) as a text-to-text problem?", options: { a: "BERT", b: "GPT", c: "T5", d: "RNN" }, correct: "c", explanation: "T5 (Text-to-Text Transfer Transformer) is a unified framework that translates every NLP task into a text-to-text format." },
                { id: 13, text: "What stemming algorithm from 1979 remains the industry standard for removing word endings?", options: { a: "The Chomsky Hierarchy", b: "The Porter Stemming Algorithm", c: "The McParseface Neural Parser", d: "The Markov Chain Model" }, correct: "b", explanation: "The Porter stemming algorithm, developed by Martin Porter in 1979, is the foundational and most widely used algorithm for stemming." },
                { id: 14, text: "Coreference resolution is responsible for:", options: { a: "Converting audio waves to spectral features", b: "Determining if words (like a pronoun and a noun) refer to the same real-world entity", c: "Translating words sequentially from left to right", d: "Assigning Part-of-Speech tags to text" }, correct: "b", explanation: "Coreference resolution links related words in a discourse together, determining that 'She' refers to 'Alice' or 'the city' refers to 'Paris'." },
                { id: 15, text: "What is the primary function of Automatic Speech Recognition (ASR)?", options: { a: "To convert written text into spoken voice synthetically", b: "To translate speech into a foreign language without transcripts", c: "To convert audio signals of spoken language into written text", d: "To extract emotional sentiment from social media posts" }, correct: "c", explanation: "ASR translates spoken audio signals directly into corresponding text characters (speech-to-text)." }
            ];

            const handleAnswerSelect = (qId, optionKey) => {
                if (showResults) return;
                setAnswers(prev => ({ ...prev, [qId]: optionKey }));
            };

            const checkAnswers = () => {
                let currentScore = 0;
                mcqQuestions.forEach(q => {
                    if (answers[q.id] === q.correct) currentScore++;
                });
                setScore(currentScore);
                setShowResults(true);
            };

            const resetQuiz = () => {
                setAnswers({});
                setScore(null);
                setShowResults(false);
            };

            return (
                <div className="min-h-screen hero-pattern font-sans pb-24 transition-colors duration-300">
                    
                    {/* Sticky Modern Header */}
                    <header className="sticky top-0 z-50 glass-panel shadow-sm border-b border-slate-200">
                        <div className="max-w-6xl mx-auto px-4 md:px-6 py-4">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                
                                {/* Branding */}
                                <div className="flex items-center gap-3">
                                    <div className="bg-slate-800 text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-md shrink-0">
                                        <BrainCircuit size={20} />
                                    </div>
                                    <div>
                                        <h1 className="text-lg font-black text-slate-900 tracking-tight leading-none">Computational Linguistics</h1>
                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1">Syllabus Master Hub (Light Mode Only)</p>
                                    </div>
                                </div>

                                {/* Custom Status Badge */}
                                <div className="hidden md:flex items-center gap-2 bg-emerald-50 text-emerald-800 border border-emerald-200 text-xs px-3 py-1 rounded-full font-bold">
                                    <Sparkles size={12} />
                                    100% Comprehensive Syllabus Coverage
                                </div>
                            </div>

                            {/* Dynamic Scrollable Navigation Strip */}
                            <div className="relative mt-4">
                                <div className="flex flex-nowrap p-1 bg-slate-100/80 rounded-2xl overflow-x-auto no-scrollbar gap-1 relative z-0">
                                    {tabConfig.map((tab) => {
                                        const TabIcon = tab.icon;
                                        return (
                                            <button
                                                key={tab.id}
                                                onClick={() => handleTabSwitch(tab.id)}
                                                className={`px-4 py-2 rounded-xl text-xs font-black uppercase tracking-wide transition-all duration-250 whitespace-nowrap flex items-center gap-2 shrink-0 ${
                                                    activeTab === tab.id 
                                                    ? `bg-white ${activeColors.accent} shadow-sm ring-1 ring-black/5` 
                                                    : 'text-slate-500 hover:text-slate-855'
                                                }`}
                                            >
                                                <TabIcon size={14} />
                                                {tab.label}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                        </div>
                    </header>

                    {/* Main Content Render */}
                    <main className={`max-w-4xl mx-auto px-4 md:px-6 py-8 transition-opacity duration-150 ${isAnimating ? 'opacity-0' : 'opacity-100'}`}>

                        {/* =========================================
                            TAB 1: INTRODUCTION & STRUCTURE
                            ========================================= */}
                        {activeTab === 'intro' && (
                            <div className="space-y-8 animate-in fade-in duration-300">
                                
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row gap-6 items-center hover:border-rose-200 transition-colors">
                                    <div className="md:w-1/4 flex justify-center">

                                <Section title="What is Computational Linguistics?" subtitle="Definition and Scope" icon={Feather} color="rose">
                                    <div className="space-y-4 text-sm leading-relaxed text-slate-700">
                                        <p><strong>Computational Linguistics</strong> is an interdisciplinary field that combines <strong>linguistics</strong>, <strong>computer science</strong>, <strong>artificial intelligence</strong>, and <strong>cognitive science</strong> to study and model human language using computational methods.</p>
                                        <p>At its core, the discipline seeks to answer two fundamental questions:</p>
                                        <ul className="list-disc pl-5 space-y-1 font-semibold text-slate-800">
                                            <li>How can computers process and understand human language?</li>
                                            <li>How can computational tools help us analyze linguistic phenomena more effectively?</li>
                                        </ul>
                                        <p>This subject represents a crucial bridge between theoretical knowledge of language and practical technological applications:</p>
                                        <ul className="list-decimal pl-5 space-y-2">
                                            <li><strong>On the theoretical side:</strong> It involves developing formal models of syntax, semantics, and pragmatics, allowing computers to systematically represent and manipulate linguistic structures.</li>
                                            <li><strong>On the applied side:</strong> It underpins technologies such as machine translation, speech recognition, sentiment analysis, chatbots, search engines, and text-to-speech systems.</li>
                                        </ul>
                                        <p>By testing hypotheses about language through computational models, researchers gain invaluable insights into how humans acquire, process, and use language.</p>
                                    </div>
                                    <Ar title="تعريف علم اللغويات الحاسوبية ومجاله">
                                        <strong>اللغويات الحاسوبية (Computational Linguistics)</strong> هو تخصص بيني يدمج بين علم اللغويات، علوم الحاسوب، الذكاء الاصطناعي، والعلوم المعرفية لدراسة ونمذجة اللغة البشرية حاسوبياً.
                                        <br/><br/>
                                        <strong>ينقسم هذا العلم إلى شقين أساسيين:</strong>
                                        <ul className="list-disc pr-5 mt-2 space-y-1">
                                            <li><strong>الجانب النظري (Theoretical):</strong> يركز على صياغة نماذج رياضية ومنطقية لبنية اللغة وقواعدها (بناء الجمل، المعاني، والسياق) لتمثيلها في ذاكرة الحاسوب.</li>
                                            <li><strong>الجانب التطبيقي (Applied):</strong> يمثل المحرك الأساسي لتطبيقات الترجمة الآلية، معالجة الصوت، محركات البحث، وأنظمة المساعدة الذكية مثل Siri وGoogle Translate.</li>
                                        </ul>
                                    </Ar>
                                </Section>

                                <Section title="Linguistics and its Structure" subtitle="The Nuclear Tree of Linguistic Sciences" icon={Network} color="rose">
                                    <div className="space-y-4 text-sm leading-relaxed text-slate-700">
                                        <p><strong>Linguistics</strong> is the scientific study of natural languages, comprising several highly specialized branches of science centered around <strong>General Linguistics</strong> as the nucleus:</p>
                                        
                                        <div className="bg-slate-50 border rounded-2xl p-5 space-y-3 font-mono text-xs text-slate-800">
                                            <div className="font-bold border-b pb-2 text-slate-900">General Linguistics Nucleus:</div>
                                            <p><strong>1. Phonology:</strong> Deals with speech sounds, identifying similarities and differences that build and distinguish words.</p>
                                            <p><strong>2. Morphology:</strong> Studies the inner structure of individual words and the laws of creating new words from basic pieces (morphs/morphemes).</p>
                                            <p><strong>3. Syntax:</strong> Considers the structural composition of sentences and the grammatical rules connecting words.</p>
                                            <p><strong>4. Semantics & Pragmatics:</strong> Semantics studies the meaning of words and texts; Pragmatics studies situational context and intent behind language production.</p>
                                        </div>

                                        <p><strong>Other Key Branches of Linguistics:</strong></p>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Historical / Comparative Linguistics:</strong> Investigates linguistic history, ancestral relationships, and structural evolution across families (Romance, Germanic, Slavonic Families). Comparison allows for predicting elements of one language from another.</li>
                                            <li><strong>Contrastive Linguistics / Typology:</strong> Classifies languages based on shared structural features regardless of their genetic origin.</li>
                                            <li><strong>Sociolinguistics & Dialectology:</strong> Sociolinguistics studies language variations across social strata. Dialectology compares regional dialects across the space axis.</li>
                                            <li><strong>Lexicography:</strong> Studies the lexicon and designs methods to compile comprehensive dictionaries.</li>
                                            <li><strong>Psycholinguistics & Mathematical Linguistics:</strong> Psycholinguistics runs experiments on cognitive language behavior. Mathematical linguistics focuses on formal generative grammars.</li>
                                            <li><strong>Applied Linguistics:</strong> Deploys general linguistic ideas into broad, real-world human practice.</li>
                                        </ul>

                                    <Ar title="هيكل علم اللغويات وفروعه">
                                        <strong>علم اللغويات العام (General Linguistics)</strong> هو النواة المركزية ويتفرع إلى:
                                        <ul className="list-disc pr-5 mt-2 space-y-1">
                                            <li><strong>الصوتيات (Phonology):</strong> دراسة أصوات الكلام وتمييز الحروف.</li>
                                            <li><strong>الصرف (Morphology):</strong> بنية الكلمة الفردية وطرق تكوينها من وحدات دلالية صغيرة تسمى (Morphs).</li>
                                            <li><strong>النحو (Syntax):</strong> صياغة وبناء الجمل والعلاقات الإعرابية والتركيبية بين الكلمات.</li>
                                            <li><strong>الدلالة والبراجماتية (Semantics & Pragmatics):</strong> دراسة المعاني والمنطق (الدلالة) والسياق والمقاصد البشرية وراء النصوص (البراجماتية).</li>
                                        </ul>
                                        <strong>اللغويات التاريخية والمقارنة:</strong> تبحث أصول اللغات وعلاقتها ببعضها (مثل اشتقاق اللغات الرومانسية كالإسبانية والفرنسية من اللاتينية). ويتيح لنا منهج التناظر اللغوي التنبؤ بالكلمات (مثل التناظر بين الكلمات الإسبانية المنتهية بـ ción والإنجليزية المنتهية بـ tion).

                                <Section title="Defining a Word: Word, Occurrence, Wordform, & Lexeme" icon={Users} color="rose">
                                    <div className="space-y-4 text-sm leading-relaxed text-slate-700">
                                        <p>The term "word" is highly ambiguous in scientific linguistics. To process text accurately, computational models must distinguish between three distinct concepts:</p>
                                        <ol className="list-decimal pl-5 space-y-3">
                                            <li><strong>Word Occurrence:</strong> A word located in a specific place in a sentence. Every appearance is counted separately.</li>
                                            <li><strong>Wordform:</strong> The actual physical shape of a word without considering its syntactic position (e.g., "book" and "books" are two distinct wordforms).</li>
                                            <li><strong>Lexeme:</strong> An abstract group of wordforms sharing the same semantic core meaning. Represented in dictionaries by a standard lemma (base form).</li>
                                        </ol>

                                        <div className="bg-rose-50/40 border border-rose-100 rounded-2xl p-5 space-y-2">
                                            <p className="font-bold text-rose-950">Sentence Example for Analysis:</p>
                                            <p className="italic font-serif text-slate-800 text-md">"I return the books today, but she returns the book now."</p>
                                            <ul className="list-disc pl-5 space-y-1 text-xs">
                                                <li><strong>Word Occurrences:</strong> 12 substrings.</li>
                                                <li><strong>Wordforms:</strong> "return" and "returns" are two wordforms; "book" and "books" are two wordforms.</li>
                                                <li><strong>Lexemes:</strong> {`{book, books}`} map to the single lexeme <strong>BOOK</strong>; {`{return, returns}`} map to the single lexeme <strong>RETURN</strong>.</li>
                                            </ul>
                                        </div>
                                    </div>
                                    <Ar title="تفكيك مفهوم الكلمة: الحدث، الصيغة، والكلمة المعجمية">
                                        كلمة "الكلمة" غامضة حاسوبياً، لذا قسّمها اللغويون لثلاثة مستويات لضبط الحسابات:
                                        <ul className="list-disc pr-5 mt-2 space-y-1">
                                            <li><strong>الحدث اللفظي (Word Occurrence):</strong> الكلمة بموقعها المحدد في الجملة (لو تكررت الكلمة 5 مرات، تُحسب كـ 5 أحداث لفظية منفصلة).</li>
                                            <li><strong>صيغة الكلمة (Wordform):</strong> الشكل المادي المكتوب للكلمة (مثال: book وصيغة الجمع books هما صيغتان مختلفتان ماديّاً).</li>
                                            <li><strong>الكلمة المعجمية (Lexeme):</strong> المفهوم المجرد الذي يجمع الصيغ المختلفة (مثال: الصيغتان book و books تنتميان لنفس الأصل المعجمي وهو BOOK). المعاجم تعتمد فقط على الـ Lexeme كمدخل رئيسي لها.</li>
                                        </ul>
                                    </Ar>
                                </Section>

                                <Section title="Tokenization & Morphology" icon={Briefcase} color="rose">
                                    <div className="space-y-4 text-sm leading-relaxed text-slate-700">
                                        <p><strong>Tokenization</strong> is the foundational pre-processing step in NLP. It is the process of breaking running text into individual units called <strong>tokens</strong> (words, punctuation, or subwords).</p>
                                        <p><strong>The Core Challenge:</strong> Computers do not inherently understand human words; they only see strings of characters. Tokenization splits text systematically using character systems like Unicode to handle multilingual symbols correctly.</p>
                                        <p><strong>Linguistic Ambiguities in Tokenization:</strong></p>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Hyphens and Boundaries:</strong> Words like "icebox" can be written as "icebox", "ice-box", or "ice box". Deciding whether to split them is a difficult parsing task.</li>
                                            <li><strong>Interjections and Noise:</strong> Fillers like "um" or abbreviations must be identified and categorized.</li>
                                            <li><strong>Typological Barriers:</strong> In English, space-separated tokenization works relatively well. However, in <strong>Chinese</strong> there are no spaces between words. In highly morphologically rich languages like <strong>Turkish</strong>, words are extremely long and contain multiple nested suffixes representing complete sentences.</li>
                                            <li><strong>Morphemic Tokenization:</strong> A <strong>morpheme</strong> is the smallest unit of meaning in language. Tokenizers often split words into constituent morphemes (e.g., "longer" $\rightarrow$ "long" + "-er") to assist down-stream systems in semantic mapping.</li>
                                        </ul>
                                    </div>
                                    <Ar title="عملية التقطيع (Tokenization) والتحليل الصرفي">
                                        <strong>عملية التقطيع (Tokenization):</strong> هي الخطوة التمهيدية الأولى لمعالجة النصوص، وتعني تقسيم النص الطويل إلى وحدات صغيرة تسمى رموزاً أو مقاطع (Tokens).
                                        <br/><br/>
                                        <strong>أهم تحديات التقطيع لغوياً:</strong>
                                        <ul className="list-disc pr-5 mt-2 space-y-1">

                                            <li><strong>اللغات بلا مسافات:</strong> مثل اللغة الصينية التي تُكتب كحروف متصلة دون مسافات، واللغات الإلصاقية كاللغة التركية حيث يمكن لكلمة واحدة طويلة أن تحتوي على فاعل وفعل ومفعول به.</li>
                                            <li><strong>المورفيمات (Morphemes):</strong> المورفيم هو أصغر وحدة تحمل معنى في اللغة (مثل تقسيم كلمة "longer" إلى المورفيم "long" ومورفيم المقارنة "er") لتسهيل معالجتها.</li>
                                        </ul>
                                    </Ar>

                                    <div className="space-y-4 text-sm leading-relaxed text-slate-700">
                                        <p><strong>Natural Language Processing (NLP)</strong> lies at the intersection of computer science, linguistics, and machine learning. Its goal is to establish communication between computers and humans in natural language, enabling machines to understand and generate human text similar to how humans do.</p>
                                        <p>The domain is divided into three core functional components:</p>

                                            <li><strong>Natural Language Understanding (NLU):</strong> A computer's internal capacity to interpret contextual meaning, syntax, and user intent.</li>
                                            <li><strong>Natural Language Generation (NLG):</strong> A computer's ability to output natural-sounding human language.</li>
                                        </ul>
                                    </div>
                                    <Ar title="مكونات معالجة اللغة الطبيعية">
                                        تعد معالجة اللغة الطبيعية (NLP) حلقة الوصل بين الذكاء الاصطناعي واللغويات، وتنقسم لثلاثة محاور:
                                        <ul className="list-disc pr-5 mt-2 space-y-1">

                                            <li><strong>فهم اللغة الطبيعية (NLU):</strong> تمكين الحاسوب من تفسير المعنى، النوايا، والسياق (وهذا هو الجزء الأكثر صعوبة).</li>
                                            <li><strong>توليد اللغة الطبيعية (NLG):</strong> صياغة وإنتاج نصوص كلامية بشرية بأسلوب طبيعي ومترابط ومفهوم.</li>
                                        </ul>

                                <Section title="Why NLP is Uniquely Difficult" subtitle="Ambiguity and the Human Symbolic System" icon={ShieldAlert} color="emerald">
                                    <div className="space-y-4 text-sm leading-relaxed text-slate-700">
                                        <p>Natural human language is extremely difficult for computer systems because it was created for humans, who share experiences and intuition. As explained by prominent linguist <strong>Chris Manning</strong>, human language is a <strong>discrete, symbolic, and categorical system</strong>.</p>
                                        
                                        <div className="bg-emerald-50 text-emerald-950 p-4 rounded-xl border border-emerald-100 text-xs leading-relaxed space-y-2">
                                            <p className="font-bold">The Core Paradox of Language Processing:</p>
                                            <p>Human symbols (words, signs, gestures) are discrete categories. However, in our neural pathways (human brain), these symbols are represented as <strong>continuous patterns</strong> and transmitted via continuous signals (soundwaves, light waves).</p>
                                        </div>

                                        <p><strong>Primary Roadblocks in NLP:</strong></p>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Generative Infinity:</strong> There are infinitely many ways to arrange words into sentences.</li>
                                            <li><strong>Polysemy & homonymy:</strong> Individual words have multiple unrelated meanings depending on context.</li>
                                            <li><strong>Contextual Ambiguity:</strong> Interpreting exact meaning requires shared worldly experience, which computers lack.</li>
                                        </ul>

                                        <p><strong>Classic Example of Structural Ambiguity:</strong></p>
                                        <div className="bg-slate-50 p-4 rounded-xl border font-serif italic text-slate-800 text-sm">
                                            "The Pope's baby steps on gays"
                                        </div>
                                        <p>This actual news headline can be interpreted in two completely different ways:</p>
                                        <ul className="list-disc pl-5 space-y-1 text-xs text-slate-600">
                                            <li>Meaning A: The Pope's infant physically walks on top of gay individuals (morbidly bizarre).</li>
                                            <li>Meaning B: The Pope is taking small progressive measures (baby steps) regarding gay rights issues.</li>
                                        </ul>
                                        <p>While humans easily resolve this using real-world context, a machine struggles to choose the correct interpretation.</p>
                                    </div>
                                    <Ar title="لماذا تعد معالجة اللغة الطبيعية صعبة جداً؟">
                                        اللغة البشرية معقدة ومصممة للتواصل الإنساني القائم على المشاعر والخبرات المشتركة.
                                        <br/><br/>
                                        يوضح العالم <strong>كريس مانينغ</strong> أن اللغة نظام <strong>رمزي ومحدد ومنفصل (Discrete and Symbolic)</strong>، ولكن في العقل البشري، تتم معالجة هذه الرموز كأنماط إشارات مستمرة (أصوات ورؤية).
                                        <br/><br/>
                                        <strong>أهم تحديات الفهم الحاسوبي:</strong>
                                        <ul className="list-disc pr-5 mt-2 space-y-1">
                                            <li><strong>اللانهاية الإنتاجية:</strong> توجد طرق لا حصر لها لترتيب الكلمات وصياغتها.</li>
                                            <li><strong>الغموض الدلالي والسياقي:</strong> مثل عنوان الخبر الشهير: <em>"The Pope's baby steps on gays"</em> والذي يمكن تفسيره بسذاجة حاسوبية على أن طفل البابا يدهس المثليين بأقدامه، أو التفسير الصحيح وهو أن البابا يتخذ خطوات تدريجية بسيطة (Baby steps) تجاه الملف. غياب الفهم السياقي يعيق الحاسوب عن الترجمة السليمة.</li>
                                        </ul>
                                    </Ar>
                                </Section>

                                <Section title="Syntactic vs. Semantic Analysis" icon={Feather} color="emerald">
                                    <div className="space-y-4 text-sm leading-relaxed text-slate-700">
                                        <p><strong>Syntax</strong> and <strong>Semantics</strong> are the two primary dimensions of linguistic analysis. A valid language sentence requires both, but they govern completely different aspects:</p>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Syntactic Analysis (Syntax):</strong> Focuses on the structural and grammatical rules of a sentence (how words are organized into valid templates).</li>
                                            <li><strong>Semantic Analysis (Semantics):</strong> Focuses on the logical meaning, truth value, and relational context of the words.</li>
                                        </ul>

                                        <p>A sentence can be completely syntactically correct, yet remain semantically invalid (meaningless):</p>
                                        <div className="bg-slate-50 p-4 rounded-xl border font-mono text-xs text-slate-800">
                                            "cows flow supremely"
                                        </div>
                                        <p><strong>Structural Breakdown:</strong></p>
                                        <ul className="list-disc pl-5 space-y-1 text-xs">
                                            <li><strong>Syntax:</strong> Grammatically perfect. [cows / Noun] + [flow / Verb] + [supremely / Adverb] matches the standard English structural template.</li>
                                            <li><strong>Semantics:</strong> Completely meaningless. Cows are solid mammals and cannot fluidly 'flow' anywhere.</li>
                                        </ul>
                                        <p>Semantic analysis remains one of the hardest, unresolved research challenges in computer science, because speech recognition systems can accurately transcribe audio characters while failing to understand what the words actually mean.</p>
                                    </div>
                                    <Ar title="التحليل النحوي مقابل التحليل الدلالي">
                                        <p><strong>التحليل النحوي (Syntax):</strong> يبحث القواعد الهيكلية وتركيب الجملة ومواقع الكلمات الإعرابية.</p>
                                        <p><strong>التحليل الدلالي (Semantics):</strong> يبحث عن المنطق والمعنى الفعلي والروابط الفكرية بين الألفاظ.</p>
                                        <br/>
                                        <strong>مثال شهير:</strong> الجملة <em>"cows flow supremly"</em> هي جملة <strong>نحوية صحيحة بنسبة 100%</strong> لأن تركيبها يتكون من (فاعل + فعل + حال)، ولكنها جملة <strong>دلالية خاطئة تماماً</strong> ولا معنى لها؛ فالأبقار كائنات صلبة ولا يمكنها أن تسيل أو تتدفق (Flow) مثل الماء. أنظمة تحويل الصوت لكتابة تنجح نحوياً لكنها تفشل دلالياً في فهم ما يطلبه المستخدم.
                                    </Ar>
                                </Section>

                                            <pre className="no-scrollbar">{`          [S] (Full Sentence)

                                            <li><strong>Grammatical Relationships:</strong> The structural links show semantic roles. Because NP ("the thief") is directly connected under S next to VP, the computer can deduce that "the thief" is the subject of the verb "robbed."</li>
                                        </ol>

                                    <Ar title="تحليل جمل الإعراب البنيوي (Parsing)">

                                        <p><strong>1. Stemming:</strong> A foundational technique used to strip prefixes and suffixes (affixes), reducing a word to its base <strong>stem</strong>. Words with different structural forms often share the exact same core meaning (e.g., "touched" and "touching" both map to "touch").</p>
                                        <p>Storing every single variation of every word would require an enormous database, leading to slow processing times. Stemming solves this by only storing the common stem. A famous and widely used method for this is the <strong>Porter Stemming Algorithm (1979)</strong>.</p>
                                        <p><strong>2. Text Segmentation:</strong> The process of dividing continuous text into meaningful units such as words, sentences, or topics. While English segmenters can mostly rely on spaces, ambiguities like "icebox", "ice-box", and "ice box" remain a challenge.</p>
                                    </div>

                                        <p><strong>تقسيم النصوص (Segmentation):</strong> تقسيم الحروف المتصلة لوحدات دلالية؛ وهو معقد حتى في الإنجليزية عند معالجة الكلمات المركبة مثل (icebox أو ice-box).</p>

                                        <p>Advanced NLU applications depend on three pipeline tasks working in sequence:</p>
                                        <ul className="list-disc pl-5 space-y-3">
                                            <li><strong>Named Entity Recognition (NER):</strong> Locates and classifies nouns into predefined categories (Persons, Organizations, Locations, Money, Dates).
                                                <div className="bg-slate-50 p-3 rounded-xl border font-mono text-xs text-slate-800 mt-2">
                                                    <p><strong>Pre-NER:</strong> "Martin bought 300 shares of SAP in 2016."</p>
                                                    <p className="text-blue-800 mt-1"><strong>Post-NER:</strong> "[Martin] Person bought 300 shares of [SAP] Organization in [2016] Time."</p>
                                                </div>
                                            </li>
                                            <li><strong>Relationship Extraction:</strong> Identifies semantic relations between the named entities outputted by NER (e.g., identifying marriage, employment, or purchasing connections).</li>
                                            <li><strong>Sentiment Analysis:</strong> Evaluates documents to predict the writer's attitude or emotional tone (Positive, Negative, Neutral). This helps businesses analyze surveys, feedback, and reviews.</li>

                                                <p><strong>2. Chris Manning's Paradox:</strong> Language is a discrete, symbolic, and categorical system at the conceptual level, but in the human brain, these symbols are represented as continuous patterns and transmitted through continuous waves (sound and light).</p>
                                                <p><strong>3. Deep Ambiguity:</strong> Words have multiple meanings (polysemy), and sentences are structurally ambiguous. For example, the headline *"The Pope's baby steps on gays"* highlights how a lack of real-world context and worldly intuition makes syntactic resolution extremely difficult for computers.</p>

                                        answer={

                                                <p><strong>Syntactic Analysis (Syntax):</strong> Evaluates the grammatical structure of text using explicit structural rules. The sentence *"cows flow supremely"* is perfectly valid syntactically because it matches the structural template of [Noun Phrase (Subject) + Verb (Predicate) + Adverb (Modifier)].</p>
                                                <p><strong>Semantic Analysis (Semantics):</strong> Evaluates the logical meaning, truth conditions, and relationship between the words. Even though the sentence is grammatically correct, it is semantically invalid (makes no sense) because cows are solid mammals and cannot fluidly 'flow.'</p>
                                                <p><strong>NLU Implication:</strong> Speech recognition systems often succeed at syntactic transcription while failing at semantic understanding, proving semantics is a much harder, unresolved problem.</p>

                                    <EssayCard 
                                        question="Q3. Deeply explain the difference between the three major transformer architectures: BERT, GPT, and T5."
                                        answer={
                                            <div className="space-y-2">
                                                <p><strong>1. BERT (Language Understanding):</strong> Reads context bidirectionally (both left and right simultaneously). Excels at classification, sentiment analysis, and context-dependent tasks (e.g. understanding 'river bank' vs 'financial bank').</p>
                                                <p><strong>2. GPT (Language Generation):</strong> Reads context from left to right (autoregressive next-word prediction). Excels at creative writing, dialogue, and text generation.</p>
                                                <p><strong>3. T5 (Unified Text-to-Text):</strong> Converts all NLP tasks into a single text-to-text format. Flexible enough to handle translation, summarization, and classification in the same model structure.</p>

                                    <EssayCard 
                                        question="Q4. Discuss the difference between Constituency Parsing and Dependency Parsing with visual examples."
                                        answer={
                                            <div className="space-y-2">
                                                <p><strong>Constituency Parsing:</strong> Focuses on grouping words into hierarchical phrasal structures (constituents) based on Context-Free Grammars (CFGs). Brackets words together into Noun Phrases (NP) and Verb Phrases (VP) underneath the root sentence node (S).</p>
                                                <p><strong>Dependency Parsing:</strong> Focuses on direct, binary, directed grammatical relationships between individual words. Instead of grouping phrases, it connects dependent words to their semantic head words (e.g., sat $\rightarrow$ subject (cat), sat $\rightarrow$ object (mat)).</p>
                                            </div>
