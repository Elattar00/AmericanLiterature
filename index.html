        const CharacterCard = ({ name, role, details, icon: Icon, color = "rose" }) => {

                    <div

                            <div>

                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </div>
                    <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isOpen ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>

        const QuoteCard = ({ dialogue, examParagraphs, borderSide = "border-rose-500", themeColor = "rose" }) => {
            const headingColors = {
                emerald: "text-emerald-800 border-emerald-100/30",
                indigo: "text-indigo-800 border-indigo-100/30",
                rose: "text-rose-800 border-rose-100/30",
                amber: "text-amber-800 border-amber-100/30",
                slate: "text-slate-800 border-slate-200/50",
                purple: "text-purple-800 border-purple-100/30",
                blue: "text-blue-800 border-blue-100/30"
            };
            const bgColors = {
                emerald: "bg-emerald-50/40 border-emerald-100/50",
                indigo: "bg-indigo-50/40 border-indigo-100/50",
                rose: "bg-rose-50/40 border-rose-100/50",
                amber: "bg-amber-50/40 border-amber-100/50",
                slate: "bg-slate-50 border-slate-200/50",
                purple: "bg-purple-50/40 border-purple-100/50",
                blue: "bg-blue-50/40 border-blue-100/50"
            };

            return (
                <div className="bg-white rounded-[1.5rem] border border-slate-200 shadow-sm p-5 md:p-6 space-y-4">
                    {/* dialogue Frame */}
                    <div className={`bg-slate-50/80 rounded-xl p-4 border-l-4 ${borderSide} relative`}>
                        <div className="absolute right-4 top-2 text-slate-200 pointer-events-none select-none font-serif text-3xl">“</div>
                        <div className="relative z-10 space-y-1.5 font-serif text-slate-700 text-sm md:text-base leading-relaxed">
                            {dialogue}
                        </div>
                    </div>
                    
                    {/* Exam Answer Block */}

                        <span className={`text-[9px] font-black uppercase tracking-widest flex items-center gap-1 border-b pb-1.5 ${headingColors[themeColor] || headingColors.rose}`}>
                            <Feather size={11}/> Exam Analysis
                        </span>
                        <div className="text-slate-800 text-[13.5px] leading-relaxed font-normal space-y-2">
                            {examParagraphs}
                        </div>
                    </div>
                </div>
            );
        };

        const EssayCard = ({ question, answer, arabicKey, themeColor = "rose" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const activeColors = {
                rose: "bg-rose-50 border-rose-200 text-rose-800 focus:ring-rose-500",
                indigo: "bg-indigo-50 border-indigo-200 text-indigo-800 focus:ring-indigo-500",
                purple: "bg-purple-50 border-purple-200 text-purple-800 focus:ring-purple-500",
                blue: "bg-blue-50 border-blue-200 text-blue-800 focus:ring-blue-500",
                emerald: "bg-emerald-50 border-emerald-200 text-emerald-800 focus:ring-emerald-500"
            };
            const col = activeColors[themeColor] || activeColors.rose;

            return (
                <div className={`bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm transition-all duration-300 ${isOpen ? 'ring-1 ring-slate-300 shadow-md' : 'hover:border-slate-300'}`}>
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className={`w-full p-5 text-left flex items-start justify-between gap-4 font-bold text-[15px] text-slate-850 hover:bg-slate-50 transition-colors`}
                    >
                        <span className="leading-snug">{question}</span>
                        <div className="w-8 h-8 rounded-full flex items-center justify-center border-slate-200 bg-white shrink-0 mt-0.5">
                            <svg className={`w-4 h-4 text-slate-500 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </button>
                    {isOpen && (
                        <div className="p-6 border-t border-slate-150 bg-white space-y-4">
                            <div className="text-sm leading-relaxed text-slate-700 space-y-3">
                                {answer}
                            </div>
                            {arabicKey && (
                                <Ar title="تبسيط وتلخيص مقالي">
                                    {arabicKey}
                                </Ar>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const sticksQuotesData = [
            {
                id: 1,
                act: "Act I",
                speaker: "Sergeant Major & David",
                dialogue: (
                    <>
                        <p>SERGEANT MAJOR: Excuse me. Listen to me. I'd like to speak to the father here. ... I have your son.</p>
                        <p>OZZIE: What?</p>
                        <p>SERGEANT MAJOR: Your son. ... He's blind.</p>
                        <p>DAVID: Sergeant, you said "home." I don't think so. ... It doesn't feel right. Let me touch their faces... I can't see.</p>
                    </>
                ),
                paragraphs: (
                    <>
                        <p><strong>Context:</strong> Opening of Act I. The cold, businesslike Sergeant Major returns David, a blinded, traumatized Vietnam veteran, to his uncomfortable and emotionally distant family.</p>
                        <p><strong>Analysis:</strong> The military treats David as a shipped object ("shipping receipt"). David's instant sense of dislocation ("Sergeant, you said 'home.' I don't think so") highlights his deep alienation and starts the irreconcilable clash between his raw war experiences and his family's artificial, sitcom-like reality.</p>
                        <Ar title="أدب الحرب وعجز التواصل العائلي">
                            <strong>المشهد الافتتاحي:</strong> يعود ديفيد الأعمى إلى منزله كطرد عسكري مادي يتطلب توقيع والده. تعجز العائلة تماماً عن إظهار أي تعاطف إنساني، بينما صرخة ديفيد المذعورة ("أنت قلت البيت.. لا أظن ذلك") تجسد فداحة الاغتراب والفصام النفسي بين العائد من الجبهة وبيئته السابقة.
                        </Ar>
                    </>
                )
            },
            {
                id: 2,
                act: "Act I",
                speaker: "Sergeant Major & David",
                dialogue: (
                    <>
                        <p>HARRIET: David...! Oh, David...!</p>
                        <p>OZZIE: Harriet... don't be upset... they say... he can't see...!</p>
                        <p>SERGEANT MAJOR: Who's gonna sign this for me, mister? It's a shipping receipt. I got to have somebody's signature... I got deliveries to make all across this country.</p>
                        <p>DAVID: Nooooooo... Sergeant... noo; there's something wrong; it all feels wrong. Where are you? Are you here? I don't know these people!</p>
                    </>
                ),
                paragraphs: (
                    <>
                        <p><strong>Context:</strong> Spoken during David's chaotic arrival in Act I as the family struggles to comprehend his blindness.</p>
                        <p><strong>Analysis:</strong> This quote exposes the sweeping, commercialized destruction of the war. The Sergeant treats broken soldiers as simple deliveries ("shipping receipt"). It highlights the contrast between Harriet’s domestic trivialities and the brutal reality of war, while David’s panic ("I don't know these people!") indicates complete psychological trauma.</p>
                        <Ar title="وحشية الحرب وفقدان الهوية">
                            <strong>شحنات الجنود المشوهين:</strong> يرفض الضابط التوقف للراحة، مشيراً إلى قيادته شاحنة محملة بالجنود المحطمين لتوزيعهم كطرود عبر أمريكا. يعري الكاتب هنا وحشية الحرب الاستعمارية وتفاهة العائلة الأمريكية الاستهلاكية المنفصلة عن الحقيقة.
                        </Ar>
                    </>
                )
            },
            {
                id: 3,
                act: "Act I",
                speaker: "Stage Directions",
                dialogue: (
                    <>
                        <p>(And the door to the outside bursts open. There is a small girl in the doorway, an ASIAN GIRL. She wears the Vietnamese Au Dai, black slacks and white tunic slit up the sides.)</p>
                    </>
                ),
                paragraphs: (
                    <>
                        <p><strong>Context:</strong> Stage direction in Act I indicating the ghostly entrance of Zung into the Nelson household.</p>
                        <p><strong>Analysis:</strong> Zung's entry brings Edward Said's concept of "The Other" physically onto the stage. Her presence represents a threat of "racial contamination" to the white middle-class family and serves as a visual, haunting reminder of their imperial guilt.</p>
                        <Ar title="دخول طيف زونج ومفهوم الآخر">
                            <strong>طيف زونج:</strong> يمثل ظهور الفتاة بزيها التقليدي تجسيداً لـ "الآخر" المستضعف. يهدد هذا الطيف استقرار العائلة البيضاء التي تخشى الفضيحة وتخاف من تدمير نقاء عرقها، مما يوضح ملاحقة الذنب الإمبراطوري لضمير الجناة.
                        </Ar>
                    </>
                )
            },
            {
                id: 4,
                act: "Act I",
                speaker: "David & Ozzie",
                dialogue: (
                    <>
                        <p>DAVID: It was California. I was in the barracks. The CQ came to tell me there was someone to see me. It was Hank asking did I remember him. He'd seen my name on a list and wondered if I was Ozzie's boy. He was dying, he said. The sickness was congenital. We had a long, long talk. ...</p>
                        <p>OZZIE: But his parents were good fine people, David. ... Did he mention me?</p>
                    </>
                ),
                paragraphs: (
                    <>
                        <p><strong>Context:</strong> David tells Ozzie about Hank, Ozzie's old friend who died of a genetic disease.</p>
                        <p><strong>Analysis:</strong> Illustrates the failure of communication between father and son. David shares a vulnerable memory about death, but Ozzie defensively views disease as a class defect ("they were good fine people") and selfishly obsesses over his own validation ("Did he mention me?").</p>
                        <Ar title="فشل التواصل وأنانية الأب">
                            <strong>حوار هانك:</strong> يحاول ديفيد مشاركة قصة إنسانية مؤثرة عن رحيل هانك بمرض وراثي، لكن الأب يتهرب ويدعي بسطحية أن عائلة هانك كانت "راقية" (وكأن المرض عيب طبقي)، ثم يسأل بنرجسية: "هل ذكرني؟" هرباً من مواجهة الواقع.
                        </Ar>
                    </>
                )
            },
            {
                id: 5,
                act: "Act I",
                speaker: "David",
                dialogue: (
                    <>
                        <p>DAVID: I had fear of all the kinds of dying that there are when I went from here, and then there was this girl... with hands and hair like wings. There were candles above the net of gauze under which we lay. Lizards. Cannon could be heard. A girl to weigh no more than dust.</p>
                    </>
                ),
                paragraphs: (
                    <>
                        <p><strong>Context:</strong> David reminisces about finding peace with Zung amidst the combat zone in Vietnam.</p>
                        <p><strong>Analysis:</strong> Contrast between violent warfare ("cannon could be heard") and the fragile, poetic beauty of the girl ("hands and hair like wings"). This memory challenges his family's racist views, showing he found humanity in the "Other" whom his country ordered him to destroy.</p>
                        <Ar title="شعرية الصدمة والملجأ الإنساني">
                            <strong>طهر الضحية:</strong> يصف ديفيد بلغته الشاعرية ملاذه الروحي في فيتنام؛ الفتاة زونج التي لا تزن أكثر من غبار وسط دوي القنابل. يوضح هذا التباين الإنساني كيف عثر ديفيد على الصدق والنقاء لدى الفئات التي أُرسل لإبادتها.
                        </Ar>
                    </>
                )
            },
            {
                id: 6,
                act: "Act I",
                speaker: "Harriet, Ozzie & David",
                dialogue: (
                    <>
                        <p>HARRIET: Oh, how lovely! A Wac or Red Cross girl...?</p>
                        <p>DAVID: NO.</p>
                        <p>OZZIE: Redhead or blonde, Dave?</p>
                        <p>DAVID: NO.</p>
                        <p>OZZIE: I mean, all right, what you mean is you whored around a lot. Sure. You whored around. That's what you're saying. You banged some whores... Had some intercourse. Sure, I mean, that's my point.</p>
                    </>
                ),
                paragraphs: (
                    <>
                        <p><strong>Context:</strong> Ozzie and Harriet interrogate David about his romantic relationship in Vietnam, hoping she was a white American woman.</p>
                        <p><strong>Analysis:</strong> When they discover she was Vietnamese, Ozzie instantly devalues David's emotional bond by reducing it to cheap prostitution ("banged some whores"). It reflects how a capitalistic, dehumanized society commodifies and degrades relationships with the "Other."</p>
                        <Ar title="تسليع الآخر وإنكار عواطفه">
                            <strong>استجواب العلاقة:</strong> تظن العائلة بسذاجة أن حبيبته فتاة بيضاء من الصليب الأحمر، وعند صدمتهم بهويتها الفيتنامية، يختزل الأب أوزي تلك العلاقة العاطفية الراقية في ممارسة الجنس المدفوع كآلية هروب مادية ترفض أنبل المشاعر الإنسانية.
                        </Ar>
                    </>
                )
            },
            {
                id: 7,
                act: "Act I",
                speaker: "Harriet & David",
                dialogue: (
                    <>
                        <p>HARRIET: ... lonely and young and away from home... no white girls anywhere around—</p>
                        <p>DAVID: She was the color of the earth! They are the color of the earth, and what is white but winter with the earth under it like a suicide!</p>
                    </>
                ),
                paragraphs: (
                    <>
                        <p><strong>Context:</strong> Harriet attempts to excuse David's relationship as a temporary lapse due to a lack of "white girls."</p>

                                                        <p><strong>Why he matters:</strong> He mastered atmosphere, mood, and the Gothic style (dark, mysterious, gloomy settings).</p>
                                                        <Ar title="إدغار ألان بو — سيد الرعب">
                                                            يُلقَّب بـ"سيد الكآبة الرهيبة" وكتب في الأدب القوطي المظلم. قصيدته <em>الغراب</em>: رجل وحيد يزوره غراب ناطق — الحزن والجنون. نظريته "الأثر الواحد": كل قصيدة أو قصة يجب أن تُحدث مشاعر واحدة قوية. اخترع قصة المحقق الحديثة. قوته في الجو والمزاج والكلمات المختارة بعناية.
                                                        </Ar>
                                                    </div>
                                                }
                                            />
                                        </Section>
                                    </div>
                                )}

                                {/* TAB: MODERN & MID-20TH CENTURY */}
                                {activeTab === 'hoda_modern' && (
                                    <div className="space-y-8">
                                        <Section title="Modern & Mid-20th Century" subtitle="Frost · Cummings · Hughes · Plath · Ginsberg" icon={Zap} color="blue">
                                            <p className="text-slate-600 text-sm leading-relaxed">This era brought enormous experimentation and social engagement. Poets used their voices to explore identity, politics, race, and mental health in bold new ways.</p>

                                            <CharacterCard name="Robert Frost (1874–1963)" role="Nature's Philosopher" color="blue" icon={BookOpen}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p><strong>Subject:</strong> Rural New England — woods, snow, roads, stone walls. But always about deeper human truths beneath.</p>
                                                        <p><strong>Famous poem:</strong> <em>The Road Not Taken</em> — often read as about individuality, but Frost meant it as gentle irony about how we explain our choices later.</p>
                                                        <p><strong>Style:</strong> Traditional rhyme and rhythm, but filled with natural everyday American speech — timeless yet modern.</p>
                                                        <p><strong>Achievement:</strong> Won the Pulitzer Prize for Poetry 4 times — more than anyone else in American history.</p>
                                                        <p><strong>Lesson:</strong> Simple language + everyday settings = deep philosophical questions. Always look beneath the surface.</p>
                                                        <Ar title="روبرت فروست — فيلسوف الطبيعة">
                                                            كتب عن ريف نيو إنغلاند لكن بمعانٍ إنسانية عميقة. قصيدته <em>الطريق التي لم تُسلك</em>: تبدو عن الفردية لكنها في الحقيقة سخرية لطيفة. أسلوبه: وزن وقافية تقليديين مع لغة يومية طبيعية. فاز بجائزة بوليتزر للشعر ٤ مرات. درس: الكلمات البسيطة تحمل أسئلة فلسفية كبيرة.
                                                        </Ar>
                                                    </div>
                                                }
                                            />

                                            <CharacterCard name="E. E. Cummings (1894–1962)" role="The Visual Rebel" color="blue" icon={Zap}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p><strong>Famous for:</strong> Breaking every rule — no capital letters (not even "I"), weird punctuation, unusual spacing.</p>
                                                        <p><strong>Core belief:</strong> How a poem LOOKS on the page is as important as what it SAYS.</p>
                                                        <p><strong>Techniques:</strong> Split words across lines for effect. Removes spaces to speed up the reader. Rearranges words to create visual images.</p>
                                                        <p><strong>Topics:</strong> Love, nature, individuality, personal freedom.</p>
                                                        <p><strong>Extra fact:</strong> He was also a talented painter — his visual art sense shaped his poetry deeply.</p>
                                                        <p><strong>Lesson:</strong> Poetry is a visual art form too. Breaking rules can itself be artistic expression.</p>
                                                        <Ar title="إي إي كامينغز — المتمرد البصري">
                                                            يكسر كل قواعد الكتابة: لا أحرف كبيرة حتى كلمة "أنا"، ترقيم غريب، مسافات غير عادية. يعتقد أن شكل القصيدة على الورقة بنفس أهمية معناها. يقسم الكلمات عبر سطور ويزيل المسافات للتحكم في سرعة القارئ. كان رساماً موهوباً أيضاً. الدرس: كسر القواعد هو في حد ذاته تعبير فني.
                                                        </Ar>
                                                    </div>
                                                }
                                            />

                                            <CharacterCard name="Langston Hughes (1901–1967)" role="Voice of the Harlem Renaissance" color="blue" icon={Users}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p><strong>Movement:</strong> Harlem Renaissance — a major cultural explosion of African American art, music, and writing in 1920s–30s New York.</p>
                                                        <p><strong>Famous poem:</strong> <em>A Dream Deferred</em> — asks: what happens to a dream that keeps getting delayed and never fulfilled?</p>
                                                        <p><strong>Signature style:</strong> Wove jazz and blues rhythms directly into his poetry. Conversational, accessible language.</p>
                                                        <p><strong>Mission:</strong> Celebrate Black culture AND fight racial inequality at the same time.</p>
                                                        <p><strong>Why he matters:</strong> Showed how literature can be both great art AND a powerful tool for social change.</p>
                                                        <Ar title="لانغستون هيوز — صوت هارلم">
                                                            شخصية محورية في نهضة هارلم (تدفق فني وثقافي أمريكي-أفريقي في نيويورك). قصيدته <em>حلم مؤجل</em>: ماذا يحدث للحلم الذي يُؤخَّر باستمرار؟ أسلوبه: إيقاعات الجاز والبلوز في الشعر ولغة محادثة مألوفة. هدفه: الاحتفال بالثقافة السوداء ومقاومة العنصرية معاً. الدرس: الأدب يمكن أن يكون فناً عظيماً وأداة للتغيير الاجتماعي.
                                                        </Ar>
                                                    </div>
                                                }
                                            />

                                            <CharacterCard name="Sylvia Plath (1932–1963)" role="Queen of Confessional Poetry" color="blue" icon={HeartHandshake}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p><strong>Style:</strong> Confessional poetry — draws directly from the poet's own life, feelings, and inner struggles.</p>
                                                        <p><strong>Key work:</strong> <em>Ariel</em> (1965, published after her death) — considered among the most powerful confessional poems in English.</p>
                                                        <p><strong>Topics:</strong> Depression, identity, womanhood, death, and the search for self.</p>
                                                        <p><strong>Also wrote:</strong> <em>The Bell Jar</em> — a semi-autobiographical novel about mental and emotional struggle.</p>
                                                        <p><strong>Why she matters:</strong> Gave voice to women's inner emotional lives at a time society expected them to stay silent.</p>
                                                        <Ar title="سيلفيا بلاث — ملكة الشعر الاعترافي">
                                                            أسلوبها اعترافي — تأخذ مباشرة من حياتها الشخصية ومشاعرها. ديوانها <em>أريل</em>: من أقوى قصائد الاعتراف في اللغة الإنجليزية. موضوعاتها: الاكتئاب، الهوية، الأنوثة، الموت. روايتها <em>الغطاء الزجاجي</em>: عن صراعها النفسي. أهميتها: أعطت صوتاً للمشاعر الداخلية للمرأة في مجتمع يريدها صامتة.
                                                        </Ar>
                                                    </div>
                                                }
                                            />

                                            <CharacterCard name="Allen Ginsberg (1926–1997)" role="Voice of the Beat Generation" color="blue" icon={Sparkles}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p><strong>Movement:</strong> The Beat Generation — 1950s–60s writers who rejected conservative American values and sought freedom and spiritual exploration.</p>
                                                        <p><strong>Famous work:</strong> <em>Howl</em> (1955) — passionate, energetic, angry. Criticizes modern society and mourns those who don't fit in.</p>
                                                        <p><strong>Controversy:</strong> The publisher was arrested for obscenity when it was published in 1956 — but was found not guilty.</p>
                                                        <p><strong>Influences:</strong> Walt Whitman's long flowing lines + Eastern philosophy and Buddhism.</p>
                                                        <p><strong>Taboo topics he tackled:</strong> Mental illness, poverty, social oppression — directly and fearlessly.</p>
                                                        <p><strong>Why he matters:</strong> Poetry as protest. Gave a voice to society's outcasts.</p>
                                                        <Ar title="آلن غينزبرغ — صوت جيل البيت">
                                                            من قادة جيل البيت الذي رفض القيم المحافظة وسعى للحرية الروحية. قصيدته <em>عواء</em> (١٩٥٥): شديدة، غاضبة، تنتقد المجتمع. صدرت في ١٩٥٦ وتم اعتقال ناشرها بتهمة الفحش لكن بُرِّئ. تأثر بويتمان والبوذية الشرقية. تجرأ على موضوعات المرض النفسي والفقر والقهر الاجتماعي. الشعر كاحتجاج: أعطى صوتاً للمهمشين.
                                                        </Ar>
                                                    </div>
                                                }
                                            />
                                        </Section>
                                    </div>
                                )}

                                {/* TAB: CONTEMPORARY POETS */}
                                {activeTab === 'hoda_contemporary' && (
                                    <div className="space-y-8">
                                        <Section title="Contemporary & Later 20th Century" subtitle="Maya Angelou · Elizabeth Bishop" icon={Sparkles} color="purple">
                                            <p className="text-slate-600 text-sm leading-relaxed">These poets brought new perspectives — on race, justice, loss, and close observation — that defined the later 20th century literary landscape.</p>

                                            <CharacterCard name="Maya Angelou (1928–2014)" role="Poet, Memoirist, Activist" color="purple" icon={HeartHandshake}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p><strong>Famous autobiography:</strong> <em>I Know Why the Caged Bird Sings</em> (1969) — her childhood as a Black woman in the American South; racism, trauma, and finding her voice. Title comes from a poem by Paul Laurence Dunbar.</p>
                                                        <p><strong>Famous poem:</strong> <em>Still I Rise</em> — a declaration of strength against oppression. One of the most widely read poems in English.</p>
                                                        <p><strong>Style:</strong> Musical rhythm, vivid imagery, powerful hope and resilience.</p>
                                                        <p><strong>Civil rights:</strong> Worked alongside Martin Luther King Jr. and Malcolm X.</p>
                                                        <p><strong>Historic moment:</strong> Read her poem <em>On the Pulse of Morning</em> at President Clinton's inauguration in 1993 — only the 2nd poet ever to do so.</p>
                                                        <Ar title="مايا أنجيلو — الشاعرة والمناضلة">
                                                            سيرتها الذاتية <em>أعرف لماذا يغني الطائر في القفص</em> (١٩٦٩): طفولتها كأمريكية سوداء في الجنوب، العنصرية والصدمة وإيجاد صوتها. قصيدتها <em>ومع ذلك أرتفع</em>: إعلان قوة ضد القهر. أسلوبها: إيقاع موسيقي، صور حية، أمل وصمود. ناضلت مع مارتن لوثر كينغ ومالكولم إكس. ألقت قصيدة في تنصيب كلينتون ١٩٩٣ — ثاني شاعر يفعل ذلك في التاريخ.
                                                        </Ar>
                                                    </div>
                                                }
                                            />

                                            <CharacterCard name="Elizabeth Bishop (1911–1979)" role="The Precise Observer" color="purple" icon={BookOpen}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p><strong>Style:</strong> Observational/objective poetry — describe what you see with perfect accuracy and let the emotion emerge naturally. Very different from confessional poetry.</p>
                                                        <p><strong>Famous poem:</strong> <em>One Art</em> — about loss, written as a villanelle (a strict traditional form with repeating lines). Starts by claiming loss is easy to master — then gradually reveals deeper and more painful losses underneath.</p>
                                                        <p><strong>Influence:</strong> Traveled widely and lived in Brazil for years. Her travels deeply shaped her poetry — specific places and objects described with extraordinary detail.</p>
                                                        <p><strong>Award:</strong> Won the Pulitzer Prize for Poetry in 1956. Now considered one of the greatest American poets of the 20th century.</p>
                                                        <p><strong>Lesson:</strong> Restraint and precision can be more powerful than grand emotional declarations. Find meaning in specific, concrete details.</p>
                                                        <Ar title="إليزابيث بيشوب — المراقِبة الدقيقة">
                                                            أسلوبها: الشعر التأملي — تصف ما تراه بدقة مطلقة وتترك العاطفة تظهر تلقائياً. قصيدتها <em>فن واحد</em>: عن الخسارة، كُتبت كـ"فيلانيل" (شكل تقليدي صارم بسطور متكررة). سافرت كثيراً وعاشت في البرازيل وتأثر شعرها بأماكن ومواضيع محددة. فازت ببوليتزر ١٩٥٦. الدرس: ضبط النفس والدقة أقوى أحياناً من المشاعر الصاخبة.
                                                        </Ar>
                                                    </div>
                                                }
                                            />
                                        </Section>
                                    </div>
                                )}

                                {/* TAB: DRAMA */}
                                {activeTab === 'hoda_drama' && (
                                    <div className="space-y-8">
                                        <Section title="Drama" subtitle="Eugene O'Neill — A Long Day's Journey Into Night" icon={ScrollText} color="rose">
                                            <p className="text-slate-600 text-sm leading-relaxed">One of the greatest plays in American theater history — deeply personal, painfully honest, and impossible to forget.</p>

                                            <div className="bg-rose-50 border border-rose-200 rounded-2xl p-5 space-y-2 text-sm text-slate-700">
                                                <p><strong>Author:</strong> Eugene O'Neill</p>
                                                <p><strong>Written:</strong> ~1941–42 &nbsp;|&nbsp; <strong>Published/performed:</strong> 1956 (after O'Neill's death)</p>
                                                <p><strong>Setting:</strong> One single day — morning to late night — in the Tyrone family's summer home, 1912.</p>
                                                <p><strong>O'Neill himself called it:</strong> Written with <em>"deep pity and understanding and forgiveness"</em> — it is directly autobiographical (based on his own family).</p>
                                            </div>

                                            <CharacterCard name="James Tyrone" role="The Father" color="rose" icon={Users}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p>Once a celebrated stage actor. Now old, stubborn, and obsessed with money. His tightfisted nature has hurt his family for years. Represents the failure of the American Dream to bring real happiness.</p>
                                                        <Ar title="جيمس تيرون — الأب">
                                                            ممثل مسرحي مشهور سابقاً. الآن عجوز مهووس بالمال. بخله أضر بعائلته لسنوات. يمثل فشل الحلم الأمريكي في إحضار السعادة الحقيقية.
                                                        </Ar>
                                                    </div>
                                                }
                                            />
                                            <CharacterCard name="Mary Tyrone" role="The Mother" color="rose" icon={HeartHandshake}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p>Addicted to morphine. She retreats into the past and denial. Her addiction is the family's central wound — both the cause and the symptom of the family's dysfunction.</p>
                                                        <Ar title="ماري تيرون — الأم">
                                                            مدمنة على المورفين. تهرب إلى الماضي والإنكار. إدمانها هو الجرح المركزي للأسرة — سبب ونتيجة انهيار العائلة في آنٍ واحد.
                                                        </Ar>
                                                    </div>
                                                }
                                            />
                                            <CharacterCard name="Jamie Tyrone" role="The Older Son" color="rose" icon={Zap}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p>Bitter, self-destructive, and resentful. He envies and loves his brother Edmund at the same time. His own failures have made him cynical about life and family.</p>
                                                        <Ar title="جيمي تيرون — الابن الأكبر">
                                                            مرير، يدمر نفسه، وحاقد. يغار ويحب أخاه إدموند في نفس الوقت. إخفاقاته جعلته ساخراً من الحياة والأسرة.
                                                        </Ar>
                                                    </div>
                                                }
                                            />
                                            <CharacterCard name="Edmund Tyrone" role="The Younger Son (= O'Neill himself)" color="rose" icon={BookOpen}
                                                details={
                                                    <div className="space-y-2 text-sm">
                                                        <p>Seriously ill (tuberculosis). Sensitive, poetic, truthful. He represents O'Neill himself. Edmund is the moral conscience of the play — the one who truly sees the family clearly, even as it breaks him.</p>
                                                        <Ar title="إدموند تيرون — الابن الأصغر (= أونيل نفسه)">
                                                            مريض بشدة (السل). حساس، شاعري، صادق. يمثل أونيل بنفسه. هو الضمير الأخلاقي للمسرحية — الوحيد الذي يرى العائلة بوضوح حتى وهي تحطمه.
                                                        </Ar>
                                                    </div>
                                                }
                                            />

                                            <div className="bg-white border border-slate-200 rounded-2xl p-5 space-y-3 shadow-sm">
                                                <h3 className="font-bold text-slate-800 text-base flex items-center gap-2"><BrainCircuit size={18} className="text-rose-600" /> Core Themes — Easy to Remember</h3>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                                                    <div className="bg-rose-50 rounded-xl p-3 border border-rose-100">
                                                        <p className="font-bold text-rose-700">🔁 Addiction & Self-Destruction</p>
                                                        <p className="text-slate-600 mt-1">Mary's morphine addiction is never cured. Every character has their own form of escape — alcohol, illusions, blame.</p>
                                                        <Ar>الإدمان وتدمير الذات: إدمان ماري على المورفين لا يُشفى أبداً. كل شخصية تهرب بطريقتها — الكحول، الأوهام، إلقاء اللوم.</Ar>
                                                    </div>
                                                    <div className="bg-rose-50 rounded-xl p-3 border border-rose-100">
                                                        <p className="font-bold text-rose-700">👨‍👩‍👦 Family Dysfunction</p>
                                                        <p className="text-slate-600 mt-1">The Tyrones love each other but keep hurting each other. Old wounds and buried secrets surface throughout the day.</p>
                                                        <Ar>خلل الأسرة: آل تيرون يحبون بعضهم لكنهم يؤذون بعضهم باستمرار. الجراح القديمة والأسرار المدفونة تطفو على السطح طوال اليوم.</Ar>
                                                    </div>
                                                    <div className="bg-rose-50 rounded-xl p-3 border border-rose-100">
                                                        <p className="font-bold text-rose-700">⏳ The Past Controls the Present</p>
                                                        <p className="text-slate-600 mt-1">No one can escape what happened before. The characters are prisoners of their own history.</p>
                                                        <Ar>الماضي يتحكم في الحاضر: لا أحد يستطيع الهروب مما حدث. الشخصيات سجينة تاريخها الخاص.</Ar>
                                                    </div>
                                                    <div className="bg-rose-50 rounded-xl p-3 border border-rose-100">
                                                        <p className="font-bold text-rose-700">🗣️ Failure to Communicate</p>
                                                        <p className="text-slate-600 mt-1">The family talks constantly but never truly reaches each other. Love and pain exist together, but real communication is impossible.</p>
                                                        <Ar>فشل التواصل: العائلة تتكلم باستمرار لكنها لا تصل إلى بعضها أبداً. الحب والألم موجودان معاً لكن التواصل الحقيقي مستحيل.</Ar>
                                                    </div>
                                                </div>
                                                <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm text-slate-700 mt-1">
                                                    <p><strong>Title meaning:</strong> The "long day" = the literal day of the play AND each character's long, painful journey through life. The night = the darkness they all descend into.</p>
                                                    <Ar title="معنى العنوان">
                                                        "اليوم الطويل" = اليوم الحرفي للمسرحية + رحلة كل شخصية الطويلة والمؤلمة عبر الحياة. "الليل" = الظلام الذي تغرق فيه كل الشخصيات في نهاية المطاف.
                                                    </Ar>
                                                </div>
                                            </div>
                                        </Section>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
