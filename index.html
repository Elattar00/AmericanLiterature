<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Computational Linguistics | Study Guide</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        arabic: ['Noto Kufi Arabic', 'sans-serif']

                }
            }
        }
    </script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

    </script>

    <style>

        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);

        }
        
        .hero-pattern {
            background-color: #f8fafc;

            background-size: 24px 24px;
        }

        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 400ms, transform 400ms; }
        
        /* Subtle scroll hint for mobile nav */

            -webkit-mask-image: linear-gradient(to right, black 90%, transparent 100%);
            mask-image: linear-gradient(to right, black 90%, transparent 100%);

</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { createRoot } from 'react-dom/client';
        import React, { useState, useEffect, useRef } from 'react';
        import { 
            BookOpen, Users, BrainCircuit, Feather, ShieldAlert, Sparkles,
            Quote, Zap, Briefcase, ScrollText, HeartHandshake, Home, HelpCircle, 
            CheckCircle, XCircle, Network
        } from 'lucide-react';

        // Soft, highly readable Arabic Dropdown Component
        const Ar = ({ title, children }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div dir="rtl" className="mt-4 border border-slate-200 rounded-xl overflow-hidden text-right transition-all shadow-sm">
                    <button 
                        onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIsOpen(!isOpen); }}
                        className="w-full flex items-center justify-between p-3.5 bg-emerald-50/50 hover:bg-emerald-50 transition-colors"
                    >
                        <div className="flex items-center gap-3">
                            <span className="inline-block bg-emerald-100 text-emerald-800 text-[10px] font-black px-2.5 py-1 rounded border border-emerald-200 uppercase tracking-wide">شرح تفصيلي مبسط</span>
                            {title && <span className="text-[13px] font-bold text-emerald-950 font-arabic">{title}</span>}
                        </div>
                        <svg className={`w-4 h-4 text-emerald-600 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isOpen ? 'max-h-[2500px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="p-5 bg-white border-t border-emerald-100 text-slate-700 text-[14px] leading-[1.8] font-normal font-arabic">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const Section = ({ title, subtitle, icon: Icon, children, color = "rose" }) => {
            const styles = {
                emerald: { header: "from-emerald-700 to-teal-900", text: "text-emerald-50", icon: "text-emerald-200" },
                rose: { header: "from-rose-700 to-red-900", text: "text-rose-50", icon: "text-rose-200" },
                amber: { header: "from-amber-600 to-orange-800", text: "text-amber-50", icon: "text-amber-200" },
                indigo: { header: "from-indigo-700 to-violet-900", text: "text-indigo-50", icon: "text-indigo-200" },
                purple: { header: "from-purple-700 to-indigo-900", text: "text-purple-50", icon: "text-purple-200" },
                blue: { header: "from-blue-700 to-slate-900", text: "text-blue-50", icon: "text-blue-200" }
            };
            const s = styles[color] || styles.rose;

            return (
                <div className="bg-white rounded-[2rem] shadow-md shadow-slate-200/50 overflow-visible mb-10 border border-slate-200 relative group">
                    <div className={`p-8 bg-gradient-to-br ${s.header} rounded-t-[2rem] relative overflow-hidden`}>
                        <div className={`absolute -right-10 -top-10 ${s.icon} opacity-10 rotate-12 transition-transform duration-700 group-hover:rotate-6 group-hover:scale-110`}>
                            <Icon size={180} />
                        </div>
                        <div className="relative z-10 flex items-start gap-5">
                            <div className="p-3.5 bg-white/20 backdrop-blur-md rounded-2xl text-white shadow-inner shrink-0">
                                <Icon size={32} />
                            </div>
                            <div>
                                <h2 className="text-2xl font-black tracking-tight text-white mb-1">{title}</h2>
                                {subtitle && <p className={`font-medium ${s.text} opacity-90 text-sm`}>{subtitle}</p>}
                            </div>
                        </div>
                    </div>
                    <div className="p-6 md:p-8 space-y-6 text-slate-700 leading-relaxed text-[16px]">
                        {children}
                    </div>
                </div>
            );
        };

        const TermCard = ({ index, name, definition, explanation, example, arabicTitle, arabicContent, themeColor = "rose" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const borderColors = {
                emerald: isOpen ? 'border-emerald-400 ring-1 ring-emerald-400' : 'hover:border-emerald-300',
                indigo: isOpen ? 'border-indigo-400 ring-1 ring-indigo-400' : 'hover:border-indigo-300',
                rose: isOpen ? 'border-rose-400 ring-1 ring-rose-400' : 'hover:border-rose-300',
                amber: isOpen ? 'border-amber-400 ring-1 ring-amber-400' : 'hover:border-amber-300',
                purple: isOpen ? 'border-purple-400 ring-1 ring-purple-400' : 'hover:border-purple-300',
                blue: isOpen ? 'border-blue-400 ring-1 ring-blue-400' : 'hover:border-blue-300'
            };
            const indexColors = {
                emerald: 'bg-emerald-100 text-emerald-800 border-emerald-200',
                indigo: 'bg-indigo-100 text-indigo-800 border-indigo-200',
                rose: 'bg-rose-100 text-rose-800 border-rose-200',
                amber: 'bg-amber-100 text-amber-800 border-amber-200',
                purple: 'bg-purple-100 text-purple-800 border-purple-200',
                blue: 'bg-blue-100 text-blue-800 border-blue-200'
            };

            return (
                <div className={`bg-white border rounded-3xl transition-all duration-300 ${isOpen ? 'shadow-md' : 'shadow-sm'} ${borderColors[themeColor] || borderColors.rose}`}>
                    <div 
                        className="p-5 flex items-center justify-between cursor-pointer bg-slate-50/50 hover:bg-slate-50 transition-colors rounded-t-3xl"
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <div className="flex items-center gap-4">
                            <div className={`w-8 h-8 rounded-xl flex items-center justify-center font-bold text-xs border ${indexColors[themeColor] || indexColors.rose}`}>
                                {index}
                            </div>
                            <div>
                                <h3 className="font-extrabold text-slate-900 text-md">{name}</h3>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Key Terminology</p>
                            </div>
                        </div>
                        <div className="w-8 h-8 rounded-full flex items-center justify-center bg-white border border-slate-200 shadow-sm shrink-0">
                            <svg className={`w-4 h-4 text-slate-500 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </div>
                    <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isOpen ? 'max-h-[1500px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="p-6 border-t border-slate-100 space-y-4 bg-white rounded-b-3xl text-sm leading-relaxed">
                            <div>
                                <span className="inline-block bg-slate-100 text-slate-700 text-[10px] font-bold px-2 py-0.5 rounded mb-1">Official Definition</span>
                                <p className="text-slate-800 font-medium italic">"{definition}"</p>
                            </div>
                            {explanation && (
                                <div>
                                    <span className="inline-block bg-slate-100 text-slate-700 text-[10px] font-bold px-2 py-0.5 rounded mb-1">Detailed Explanation</span>
                                    <p className="text-slate-600">{explanation}</p>
                                </div>
                            )}
                            {example && (
                                <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                    <span className="inline-block bg-white text-slate-700 text-[9px] font-bold px-2 py-0.5 rounded border border-slate-200 mb-1">Concrete Example</span>
                                    <div className="text-slate-800 font-mono text-xs">{example}</div>
                                </div>
                            )}
                            {arabicContent && (
                                <Ar title={arabicTitle || `شرح مصطلح: ${name}`}>
                                    {arabicContent}
                                </Ar>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const EssayCard = ({ question, answer, arabicKey, themeColor = "rose" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const activeColors = {
                rose: "bg-rose-50 border-rose-200 text-rose-800 focus:ring-rose-500",
                indigo: "bg-indigo-50 border-indigo-200 text-indigo-800 focus:ring-indigo-500",
                purple: "bg-purple-50 border-purple-200 text-purple-800 focus:ring-purple-500",
                blue: "bg-blue-50 border-blue-200 text-blue-800 focus:ring-blue-500",
                emerald: "bg-emerald-50 border-emerald-200 text-emerald-800 focus:ring-emerald-500",
                amber: "bg-amber-50 border-amber-200 text-amber-800 focus:ring-amber-500"
            };

            return (
                <div className={`bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm transition-all duration-300 ${isOpen ? 'ring-1 ring-slate-300 shadow-md' : 'hover:border-slate-300'}`}>
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full p-5 text-left flex items-start justify-between gap-4 font-bold text-[15px] text-slate-850 hover:bg-slate-50 transition-colors"
                    >
                        <span className="leading-snug text-slate-800">{question}</span>
                        <div className="w-8 h-8 rounded-full flex items-center justify-center border border-slate-200 bg-white shrink-0 mt-0.5">
                            <svg className={`w-4 h-4 text-slate-500 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </button>
                    {isOpen && (
                        <div className="p-6 border-t border-slate-150 bg-white space-y-4">
                            <div className="text-sm leading-relaxed text-slate-700 space-y-3">
                                {answer}
                            </div>
                            {arabicKey && (
                                <Ar title="تبسيط وتلخيص مقالي">
                                    {arabicKey}
                                </Ar>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const themeColors = {
                intro: {
                    accent: "text-rose-700",
                    bgAccent: "bg-rose-800",
                    navActive: "text-rose-700 border-b-2 border-rose-700",
                    tabSelection: "rose"
                },
                apps: {
                    accent: "text-amber-700",
                    bgAccent: "bg-amber-800",
                    navActive: "text-amber-700 border-b-2 border-amber-700",
                    tabSelection: "amber"
                },
                nlp: {
                    accent: "text-emerald-700",
                    bgAccent: "bg-emerald-800",
                    navActive: "text-emerald-700 border-b-2 border-emerald-700",
                    tabSelection: "emerald"
                },
                tech: {
                    accent: "text-blue-700",
                    bgAccent: "bg-blue-800",
                    navActive: "text-blue-700 border-b-2 border-blue-700",
                    tabSelection: "blue"
                },
                lexicon: {
                    accent: "text-purple-700",
                    bgAccent: "bg-purple-800",
                    navActive: "text-purple-700 border-b-2 border-purple-700",
                    tabSelection: "purple"
                },
                quiz: {
                    accent: "text-indigo-700",
                    bgAccent: "bg-indigo-800",
                    navActive: "text-indigo-700 border-b-2 border-indigo-700",
                    tabSelection: "indigo"
                }
            };

            const [activeTab, setActiveTab] = useState('intro');
            const [isAnimating, setIsAnimating] = useState(false);
            const navRef = useRef(null);
            
            // Interactive MCQ state
            const [answers, setAnswers] = useState({});
            const [score, setScore] = useState(null);
            const [showResults, setShowResults] = useState(false);

            const handleTabSwitch = (tab, e) => {
                if(tab === activeTab) return;
                setIsAnimating(true);
                
                // Scroll the clicked tab into view on mobile
                if(e && e.target) {
                    e.target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }

                setTimeout(() => {
                    setActiveTab(tab);
                    setIsAnimating(false);
                }, 150);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const tabConfig = [
                { id: 'intro', label: '1. Intro & Structure', icon: ScrollText, color: 'rose' },
                { id: 'apps', label: '2. Core Apps', icon: Briefcase, color: 'amber' },
                { id: 'nlp', label: '3. NLP & Ambiguities', icon: ShieldAlert, color: 'emerald' },
                { id: 'tech', label: '4. Deep Learning', icon: Network, color: 'blue' },
                { id: 'lexicon', label: '5. Key Terms', icon: BookOpen, color: 'purple' },
                { id: 'quiz', label: '6. Practice Exam', icon: BrainCircuit, color: 'indigo' },
            ];

            const activeColors = themeColors[activeTab] || themeColors.intro;

            // Interactive MCQ Questions & Correct Options
            const mcqQuestions = [
                { id: 1, text: "Computational linguistics sits at the crossroads of which fields?", options: { a: "Linguistics, History, and Anthropology", b: "Linguistics, Computer Science, AI, and Brain Science", c: "Mathematics, Physics, and Engineering", d: "Sociology, Psychology, and Media" }, correct: "b", explanation: "Computational linguistics is a mixed field combining language study (linguistics), computer science, artificial intelligence, and brain science (cognitive science)." },
                { id: 2, text: "General linguistics is the center of language science. What are its four main parts?", options: { a: "Dialects, Social Factors, Dictionaries, and Types of Language", b: "Sounds (Phonology), Word Pieces (Morphology), Grammar Rules (Syntax), and Meanings/Context (Semantics/Pragmatics)", c: "History, Comparisons, Translation, and Writing systems", d: "Word Roots, Tree Structures, Text Cutting, and Vector Lists" }, correct: "b", explanation: "The four main parts of general linguistics are Phonology (study of sounds), Morphology (word structure), Syntax (sentence layout), and Semantics/Pragmatics (meaning and context)." },
                { id: 3, text: "Which language study groups different languages based on similar features, regardless of their family history?", options: { a: "Comparative Linguistics", b: "Contrastive Linguistics (Linguistic Typology)", c: "Dialectology", d: "Sociolinguistics" }, correct: "b", explanation: "Contrastive linguistics (or linguistic typology) groups and classifies different languages together based on shared features, instead of their ancestral roots." },
                { id: 4, text: "If 'returned' and 'returning' belong to the same base word family, that base family is called a:", options: { a: "Token", b: "Wordform", c: "Lexeme", d: "Morpheme" }, correct: "c", explanation: "A lexeme is the abstract family group of different spelling shapes that all share the same basic dictionary meaning (like how the lexeme RETURN covers 'returned' and 'returning')." },
                { id: 5, text: "What is the smallest unit of meaning in human language?", options: { a: "Token", b: "Morpheme", c: "Lexeme", d: "Phoneme" }, correct: "b", explanation: "A morpheme is the smallest unit with active meaning. For example, 'longer' has two morphemes: 'long' (base word) and '-er' (the grammar ending meaning 'more')." },
                { id: 6, text: "Which of the following describes the purpose of Retrieval-Augmented Generation (RAG)?", options: { a: "It records audio files into written texts instantly.", b: "It lets an AI search a factual database for correct information before writing its final answer.", c: "It replaces lists of numbers with simple word-for-word translation rules.", d: "It shrinks the file size of massive digital libraries using lossy tools." }, correct: "b", explanation: "Retrieval-Augmented Generation (RAG) is a modern method where an AI searches an external database of true facts first, then uses that found information to write a correct, hallucination-free answer." },
                { id: 7, text: "Why is natural language processing (NLP) uniquely difficult for computer systems?", options: { a: "Computers do not support modern text encoding systems like UTF-8.", b: "Language is complex, has many meanings, depends on situation, and is processed in our brains as continuous signals.", c: "The grammar rules of English have not changed since ancient times.", d: "Computer program languages like Python cannot handle word strings." }, correct: "b", explanation: "NLP is very difficult because human language has endless ways to build sentences, words often have multiple meanings, meaning depends heavily on context, and our brains process these words as continuous physical signals." },
                { id: 8, text: "A sentence that has perfect grammar rules but makes zero logical sense is:", options: { a: "'The dog went away.'", b: "'cows flow supremely'", c: "'The thief apartment the robbed.'", d: "'investigación' to 'investigation'" }, correct: "b", explanation: "'cows flow supremely' follows proper grammar layout (Subject-Verb-Adverb) but is logically meaningless, because cows are solid objects and cannot flow like water." },
                { id: 9, text: "How does constituency parsing break sentences down?", options: { a: "By drawing straight pointer arrows between individual words", b: "By grouping words into nested phrases (like Noun Phrases and Verb Phrases) using grammar structures", c: "By cutting word endings off using the Porter algorithm", d: "By translating words into continuous lists of floating-point numbers" }, correct: "b", explanation: "Constituency parsing groups words together into larger structural chunks (like Noun Phrases and Verb Phrases) to draw a branching sentence tree." },
                { id: 10, text: "In the sentence 'John gave Mary a book', what is the role (Semantic Role) of 'Mary'?", options: { a: "Agent (the actor)", b: "Theme (the object)", c: "Recipient (the receiver)", d: "Modifier (the helper)" }, correct: "c", explanation: "In Semantic Role Labeling, 'John' is the Agent (who did it), 'book' is the Theme (what was moved), and 'Mary' is the Recipient (who received it)." },
                { id: 11, text: "Which transformer model was designed to read text in both directions to deeply understand word context?", options: { a: "GPT", b: "BERT", c: "T5", d: "LSTM" }, correct: "b", explanation: "BERT reads text bidirectionally (left-to-right and right-to-left at the same time) so it can understand the exact contextual meaning of words." },
                { id: 12, text: "Which transformer model treats all different language tasks (like translation or summarizing) as a text-in, text-out problem?", options: { a: "BERT", b: "GPT", c: "T5", d: "RNN" }, correct: "c", explanation: "T5 (Text-to-Text Transfer Transformer) is built on a unified framework where every input and output is formatted as a text string." },
                { id: 13, text: "What classic formula from 1979 remains the standard tool for cutting off word endings?", options: { a: "The Chomsky Tree Hierarchy", b: "The Porter Stemming Algorithm", c: "The Neural Parsing Assistant", d: "The Markov Chain Model" }, correct: "b", explanation: "The Porter Stemming Algorithm, written by Martin Porter in 1979, is the foundational and most popular tool used to strip word endings." },
                { id: 14, text: "What is the job of coreference resolution?", options: { a: "Turning sound waves into clear digital audio numbers", b: "Working out when different words (like a pronoun and a name) mean the exact same real-world entity", c: "Translating words one-by-one from left to right", d: "Assigning Part-of-Speech tags to text" }, correct: "b", explanation: "Coreference resolution links related words together in a story, letting the computer know that the pronoun 'She' refers to the name 'Alice'." },
                { id: 15, text: "What is the primary function of Automatic Speech Recognition (ASR)?", options: { a: "Converting written text into a spoken human voice", b: "Translating speech into another language without writing anything down", c: "Converting recorded spoken voice audio into written text", d: "Analyzing the mood of social media posts" }, correct: "c", explanation: "ASR is speech-to-text technology that takes recorded audio waves of people speaking and converts them into written text characters." }
            ];

            const handleAnswerSelect = (qId, optionKey) => {
                if (showResults) return;
                setAnswers(prev => ({ ...prev, [qId]: optionKey }));
            };

            const checkAnswers = () => {
                let currentScore = 0;
                mcqQuestions.forEach(q => {
                    if (answers[q.id] === q.correct) currentScore++;
                });
                setScore(currentScore);
                setShowResults(true);
            };

            const resetQuiz = () => {
                setAnswers({});
                setScore(null);
                setShowResults(false);
            };

            return (
                <div className="min-h-screen hero-pattern font-sans pb-24 transition-colors duration-300">
                    
                    {/* Sticky Modern Header with Refined Mobile Scroll Nav */}
                    <header className="sticky top-0 z-50 glass-panel shadow-sm border-b border-slate-200">
                        <div className="max-w-6xl mx-auto px-4 md:px-6 py-4">
                            <div className="flex flex-col sm:flex-row items-center sm:items-center justify-between gap-4">
                                
                                {/* Branding */}
                                <div className="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-start">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-slate-800 text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-md shrink-0">
                                            <BrainCircuit size={20} />
                                        </div>
                                        <div>
                                            <h1 className="text-lg font-black text-slate-900 tracking-tight leading-none">Computational Linguistics</h1>
                                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1">Elattar</p>
                                        </div>
                                    </div>
                                    
                                    {/* Mobile Only Status Badge - Moves up on small screens */}
                                    <div className="sm:hidden flex items-center gap-1.5 bg-emerald-50 text-emerald-800 border border-emerald-200 text-[10px] px-2 py-1 rounded-full font-bold">
                                        <Sparkles size={10} />
                                        100% Autistic
                                    </div>
                                </div>

                                {/* Desktop Status Badge */}
                                <div className="hidden sm:flex items-center gap-2 bg-emerald-50 text-emerald-800 border border-emerald-200 text-xs px-3 py-1 rounded-full font-bold">
                                    <Sparkles size={12} />
                                    100% Autistic
                                </div>
                            </div>

                            {/* Responsive Tab Grid for perfect viewing on mobile/tablet/desktop */}
                            <div className="relative mt-4">
                                <div 
                                    ref={navRef}
                                    className="flex overflow-x-auto no-scrollbar scroll-smooth snap-x p-1.5 bg-slate-100/90 rounded-2xl gap-2 relative z-0 shadow-inner items-center scroll-hint-mask"
                                >
                                    {tabConfig.map((tab) => {
                                        const TabIcon = tab.icon;
                                        return (
                                            <button

                                        <p><strong>Natural Language Processing (NLP)</strong> is where computer science, linguistics, and machine learning meet. Its main goal is to help humans and computers talk using everyday natural languages.</p>
                                        <p>The field is divided into three main operational tasks:</p>

                                <Section title="Why NLP is Uniquely Difficult" subtitle="Double Meanings and Human Symbol Systems" icon={ShieldAlert} color="emerald">
                                    <div className="space-y-4 text-sm leading-relaxed text-slate-700">
                                        <p>Human language is extremely difficult for computer hardware because it was created by humans, for humans, relying on shared life experience and common sense. As explained by computer linguist <strong>Chris Manning</strong>, human language is a <strong>discrete, symbolic, and categorical system</strong>.</p>
                                        
                                        <div className="bg-emerald-50 text-emerald-950 p-4 rounded-xl border border-emerald-100 text-xs leading-relaxed space-y-2">
                                            <p className="font-bold">The Core Paradox of Language Processing:</p>
                                            <p>Human words and signs are separate, distinct categories (discrete). However, in our brains and voices, these symbols are represented as <strong>continuous patterns</strong> and sent using continuous waves (like sound waves and light waves).</p>
                                        </div>

                                        <p><strong>Primary Roadblocks in NLP:</strong></p>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Generative Infinity:</strong> There are infinite ways to stitch words into unique sentences, meaning a computer always encounters structures it has never seen before.</li>
                                            <li><strong>Polysemy:</strong> Most words have multiple entirely different meanings depending on where they are used.</li>
                                            <li><strong>Contextual Ambiguity:</strong> Working out the true meaning of a sentence requires real-world common sense, which computers do not have.</li>

                                        </ul>

                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Syntactic Analysis (Syntax):</strong> Looks at the structural and grammar rules of a sentence (how words are organized into a valid skeleton).</li>
                                            <li><strong>Semantic Analysis (Semantics):</strong> Looks at the actual logical meaning, truth, and relationships of the words.</li>
                                        </ul>

                                        <p>A sentence can be completely correct in its grammar, but make absolutely zero sense logically:</p>
                                        <div className="bg-slate-50 p-4 rounded-xl border font-mono text-xs text-slate-800">

                                        </div>
                                        <p><strong>Structural Breakdown:</strong></p>
                                        <ul className="list-disc pl-5 space-y-1 text-xs">
                                            <li><strong>Syntax:</strong> Grammatically perfect. [cows / Noun] + [flow / Verb] + [supremely / Adverb] matches standard English sentence templates.</li>
                                            <li><strong>Semantics:</strong> Completely meaningless. Cows are solid animals; they cannot flow like water.</li>
                                        </ul>
                                        <p>Understanding semantics is one of the hardest problems in computer science because transcription systems are great at writing down typed words, but they still struggle to understand what those words actually mean.</p>

                                        {/* Styled ASCII Parse Tree */}

                                        <p>Storing every spelling variation of every word would require a massive database and slow down processing. Stemming saves space by storing just the root. A famous, standard recipe for doing this is the <strong>Porter Stemming Algorithm (1979)</strong>.</p>

                                    <EssayCard

                                        answer={
                                            <div className="space-y-3 text-[14px]">
                                                <p><strong>Computational linguistics</strong> is a mixed field combining linguistics, computer science, artificial intelligence, and cognitive science. It aims to answer how computers can process human language and how technology can help humans study linguistic rules.</p>
                                                <p>The field operates on two main dimensions. The <strong>Theoretical dimension</strong> focuses on building mathematical models of language grammar and meaning. The <strong>Applied dimension (NLP)</strong> uses these models to build real-world tools, like machine translation and search engines.</p>
                                                <p>Historically, the field started with <strong>rule-based systems</strong> relying on strict, hand-written grammar rules. Today, it is dominated by <strong>data-driven approaches</strong>, which use machine learning and large text databases to let computers learn language patterns automatically.</p>
                                            </div>

                                        arabicKey="اللغويات الحاسوبية تجمع بين علوم اللغة والحاسوب والذكاء الاصطناعي لمعالجة لغة البشر. تنقسم لجانب نظري (بناء نماذج لغوية رياضية) وجانب تطبيقي (تطوير أدوات كالمترجم الآلي). انتقل المجال من الأنظمة القائمة على القواعد اليدوية إلى الأنظمة الحديثة المعتمدة على البيانات والتعلم الآلي."

                                    <EssayCard

                                                <p><strong>Cognitive science</strong> is the scientific study of the mind and its complex processes, including memory, problem-solving, attention, and language acquisition.</p>
                                                <p>In computational linguistics, cognitive science provides the crucial <strong>"human dimension."</strong> It helps developers understand how people naturally learn and process language in their brains.</p>
                                                <p>By studying psycholinguistic data, researchers can build AI systems that do not just process data, but truly <strong>comprehend language like a human mind does</strong>—handling ambiguity, reading context, and inferring the speaker's true intent.</p>
                                            </div>

                                        arabicKey="العلوم المعرفية تدرس العقل البشري وعملياته كالذاكرة وحل المشكلات. في اللغويات، هي توفر البعد الإنساني لتطوير أنظمة حاسوبية تفهم اللغة، تتعامل مع الغموض، وتستوعب المقاصد تماماً كما يفعل العقل البشري طبيعياً."
                                        themeColor="indigo"

                                    <EssayCard

                                                <p>The field rests on three core conclusions: Automatic Natural Language Processing (NLP) is <strong>necessary</strong>, it is <strong>very difficult</strong>, and it is <strong>possible</strong>.</p>
                                                <p>It is <strong>necessary</strong> because humans produce too much text daily to process manually. It is <strong>difficult</strong> because human language is highly ambiguous, unstructured, and relies on shared real-world experience that computers lack.</p>
                                                <p>However, it is <strong>possible</strong> thanks to the massive power of modern computers and strong formal linguistic models. Furthermore, the field proves that having a deep theoretical knowledge of linguistics is just as vital as having good programming skills.</p>
                                            </div>

                                                <p>Computational linguistics powers ten major real-world technologies that we use every day. Key applications include <strong>Machine Translation</strong> (like Google Translate) and <strong>Speech Recognition & Synthesis</strong> (like Siri converting speech to text).</p>
                                                <p>In the business world, it drives <strong>Sentiment Analysis</strong> (reading customer emotions in reviews), <strong>Information Retrieval</strong> (smart search engines), and intelligent <strong>Chatbots</strong> for automated customer service.</p>
                                                <p>It also provides the brains for <strong>Text Summarization</strong>, <strong>Language Learning Apps</strong> (like Duolingo), and <strong>Forensic Linguistics</strong>, which analyzes writing styles to track cybercriminals and detect plagiarism.</p>

                                    <EssayCard 
                                        question="Q5. What is Natural Language Processing?"
                                        answer={
                                            <div className="space-y-3 text-[14px]">
                                                <p><strong>Natural Language Processing (NLP)</strong> is the applied branch of computer science and AI focused on helping computers interact with humans using everyday natural language.</p>
                                                <p>The field is divided into three main operational layers: <strong>Speech Recognition</strong> (translating voice to text), <strong>Natural Language Understanding (NLU)</strong> (figuring out context and intent), and <strong>Natural Language Generation (NLG)</strong> (writing text that sounds human).</p>
                                                <p>By combining linguistic rules with advanced machine learning, NLP serves as the driving engine behind modern digital tools like virtual assistants, text summarizers, and instant translation software.</p>

                                        arabicKey="معالجة اللغة الطبيعية (NLP) هي فرع من الذكاء الاصطناعي يُمكن الحواسيب من التفاعل باللغة البشرية. وتشمل التعرف على الصوت، فهم المقاصد (NLU)، وتوليد النصوص المكتوبة (NLG) لتشغيل المساعدين الافتراضيين والمترجمات."
                                        themeColor="indigo"
                                    />

                                    <EssayCard 
                                        question="Q6. Why is Natural Language Processing difficult?"
                                        answer={
                                            <div className="space-y-3 text-[14px]">
                                                <p>NLP is uniquely difficult because language is a system designed by humans, for humans, relying heavily on <strong>shared real-world common sense</strong> which computers lack.</p>
                                                <p>As linguist Chris Manning notes, language consists of distinct symbols (words) that our brains process as continuous physical signals. This creates a massive challenge: humans can invent an <strong>infinite variety of sentences</strong>, meaning a computer is always reading structures it has never seen before.</p>
                                                <p>Furthermore, words often have multiple, completely different meanings depending on their context (<strong>Lexical and Structural Ambiguity</strong>). For example, the headline "The Pope's baby steps on gays" can easily be misinterpreted by a machine lacking human logic.</p>
                                            </div>
                                        }
                                        arabicKey="صعوبة NLP تكمن في أن لغة البشر لا نهائية التركيب ومليئة بالغموض وتعدد المعاني (مثل اختلاف معنى الكلمة حسب السياق)، وتعتمد على الفهم المشترك للواقع. الكلمات رموز منفصلة لكن العقل يعالجها كإشارات مستمرة، مما يربك الحواسيب."

                                    <EssayCard

                                                <p>NLP is used across almost every industry to automate and improve human-computer interactions. In <strong>Customer Service</strong>, it powers the chatbots and virtual assistants that handle client complaints 24/7.</p>
                                                <p>In <strong>Marketing and HR</strong>, NLP algorithms analyze consumer sentiment from social media posts and quickly scan thousands of resumes to find the best job candidates based on keywords.</p>
                                                <p>It is also heavily utilized in <strong>Healthcare</strong> to automatically transcribe complex doctor notes, in <strong>Finance</strong> to predict stock trends by reading the news, and in <strong>Cybersecurity</strong> to filter out spam and detect phishing threats.</p>

                                    <EssayCard 
                                        question="Q8. How does NLP work?"
                                        answer={
                                            <div className="space-y-3 text-[14px]">
                                                <p>NLP works in overlapping layers to analyze text and generate the perfect response. First, it uses <strong>Syntactic Analysis (Parsing)</strong> to break sentences down into a grammatical skeleton or "parse tree," mapping out the nouns and verbs.</p>
                                                <p>Second, it attempts <strong>Semantic Analysis</strong> to understand the actual meaning, tone, and context of those words—which remains one of the hardest challenges in computer science.</p>
                                                <p>To accomplish this, modern NLP relies heavily on <strong>Deep Learning and Word Embeddings</strong>. These systems convert words into mathematical numbers (vectors) in a continuous space, allowing the computer to mathematically process relationships, sentences, and translations.</p>
                                            </div>
                                        }
                                        arabicKey="تعمل NLP عبر طبقات متتالية: 'التحليل النحوي' لتفكيك الجملة ومعرفة الهيكل الإعرابي، ثم 'التحليل الدلالي' لفهم المعنى والسياق. وتعتمد حديثاً على 'التعلم العميق' الذي يحول الكلمات لأرقام لمعالجتها وفهمها رياضياً."

                                    <EssayCard 
                                        question="Q9. Summarize the Key Terms of Computational Linguistics."
                                        answer={
                                            <div className="space-y-3 text-[14px]">
                                                <p><strong>Core Elements:</strong> In computational text processing, a <strong>Word</strong> is a basic meaningful unit, while a <strong>Token</strong> is a sliced text piece created specifically for computer scanning. Systems use <strong>N-gram Models</strong> to predict the next word based on previous sequences.</p>
                                                <p><strong>Advanced AI Tools:</strong> To understand meaning, computers use <strong>Embeddings</strong>, which convert words into lists of numbers. Modern systems process these numbers using <strong>Neural Networks</strong> and <strong>Transformers</strong> (like BERT and GPT), which can read entire sentences at once to grasp context, powering <strong>Large Language Models (LLMs)</strong>.</p>
                                                <p><strong>Processing Tasks:</strong> NLP pipelines rely on <strong>Machine Translation (MT)</strong> and <strong>Automatic Speech Recognition (ASR)</strong> to process communication. To understand sentences logically, computers use <strong>Parsing</strong> to map grammar trees, and <strong>Semantic Role Labeling (SRL)</strong> to figure out exactly "who did what to whom."</p>
                                            </div>
                                        }
                                        arabicKey="ملخص المصطلحات: Tokenization لتقطيع النص، Embeddings لتحويل الكلمات لأرقام، Transformers كشبكات عصبية لفهم السياق جملة واحدة، و Parsing للإعراب وتحديد هيكل الجملة، و SRL لمعرفة من الفاعل وماذا فعل."
                                        themeColor="indigo"
                                    />

                                    <EssayCard 
                                        question="Q10. Write a detailed account on linguistics and its structure."
                                        answer={
                                            <div className="space-y-3 text-[14px]">
                                                <p><strong>Linguistics</strong> is the scientific study of natural language, centered around <strong>General Linguistics</strong>. This core nucleus is broken into four main layers: <strong>Phonology</strong> (the study of sounds), <strong>Morphology</strong> (internal word structure), <strong>Syntax</strong> (sentence layout and grammar), and <strong>Semantics/Pragmatics</strong> (word meanings and real-world context).</p>
                                                <p>Beyond the core, linguistics expands into several specialized branches. <strong>Historical Linguistics</strong> studies how languages evolve and share family trees, while <strong>Typology</strong> groups different languages based on shared grammatical features. <strong>Sociolinguistics</strong> examines how social class and region change the way people speak.</p>
                                                <p>Finally, <strong>Applied and Computational Linguistics</strong> take these theoretical laws and use them to solve real-world problems, such as building digital dictionaries (Lexicography) or teaching computers to process human language.</p>
                                            </div>
                                        }
                                        arabicKey="علم اللغويات يدرس اللغات الطبيعية. مركزه 'اللغويات العامة' وينقسم إلى (أصوات، صرف، نحو، ودلالة). وتتفرع منه اللغويات التاريخية (تطور اللغات)، ولغويات التناظر (مقارنة القواعد)، وعلم اللغة الاجتماعي، واللغويات الحاسوبية التطبيقية."
                                        themeColor="indigo"
                                    />

                                    <EssayCard 
                                        question="Q11. Word, what is it? Explain the concept of Lexemes."
                                        answer={
                                            <div className="space-y-3 text-[14px]">
                                                <p>The concept of a 'word' is too vague for computer science, so computational linguistics divides it into <strong>three precise levels</strong> to analyze text accurately.</p>
                                                <p>First, a <strong>Word Occurrence</strong> is simply any string of letters sitting in a specific spot in a text; every single time a word is typed, it counts as a new occurrence. Second, a <strong>Wordform</strong> refers to the exact physical spelling of the word, completely ignoring where it is placed in the sentence.</p>
                                                <p>Finally, a <strong>Lexeme</strong> is the abstract base family that groups all spelling variations of a word under one core dictionary meaning (for example, 'book' and 'books' belong to the same Lexeme). This distinction is vital because it allows computers to save massive amounts of storage space by treating variations as a single root concept.</p>
                                            </div>
                                        }
                                        arabicKey="لتفادي الغموض، تُقسم الكلمة إلى 3 مستويات: 'الحدث' (موقعها وتكرارها المستقل)، 'الصيغة' (شكلها الإملائي المجرد)، و'الكلمة المعجمية / Lexeme' (الجذر الأساسي الذي يجمع كل الصيغ كعائلة واحدة لتوفير مساحة التخزين الحاسوبية)."
                                        themeColor="indigo"
                                    />

                                    <EssayCard 
                                        question="Q12. What is the role of NLP?"
                                        answer={
                                            <div className="space-y-3 text-[14px]">
                                                <p>The primary role of NLP is to help humans manage and understand the <strong>massive amount of text</strong> produced daily in the Information Age.</p>
                                                <p>Instead of computers just storing files, NLP allows machines to actively <strong>read, proofread, summarize, and execute instructions</strong> from raw text. It bridges the gap between human communication (which is messy and contextual) and digital machines (which require strict logic).</p>
                                                <p>Ultimately, NLP extends our intellectual reach by automating tedious reading and data-gathering tasks, thereby leaving only the final, high-level decision-making to human professionals.</p>
                                            </div>
                                        }
                                        arabicKey="دور NLP هو مساعدة البشر في التعامل مع الكم الهائل من النصوص الرقمية. فهي لا تخزن الملفات فقط، بل تقرأ، تلخص، تصحح، وتنفذ الأوامر آلياً، لتكون جسراً بين البشر والآلة، وتترك مهام اتخاذ القرار النهائي للبشر."
                                        themeColor="indigo"
                                    />

                                    <EssayCard 
                                        question="Q13. What is the necessity for intelligent automatic text processing?"
                                        answer={
                                            <div className="space-y-3 text-[14px]">
                                                <p>Intelligent text processing is absolutely necessary today for two main reasons: <strong>Human Limitations</strong> and <strong>Information Overload</strong>.</p>
                                                <p>First, millions of workers lack the time or education to perfectly apply formal language rules in every document they write. It is practically <strong>cheaper and faster to teach a machine</strong> to correct grammar and style consistently than to perfectly train every human.</p>
                                                <p>Second, modern professionals must analyze thousands of documents, reviews, and reports daily. Reading this manually would take a lifetime. Using computer assistance is the <strong>only possible way</strong> to instantly find, synthesize, and extract crucial information from mountains of text.</p>
                                            </div>
                                        }
                                        arabicKey="الحاجة للمعالجة الآلية تنبع من: أولاً 'القصور البشري' (صعوبة تطبيق كل قواعد اللغة يدوياً فمن الأرخص تعليم الآلة للقيام بذلك دائماً)، وثانياً 'الانفجار المعرفي' (يستحيل على البشر قراءة آلاف المستندات يومياً، فالآلة هي الحل الوحيد للاستخراج السريع)."
                                        themeColor="indigo"
                                    />
